###############################################################################
## Global cluster definition
###############################################################################
kind: Cluster
name: homelab-dev
kubernetes:
  version: v1.32.0
talos:
  version: v1.12.0
features:
  diskEncryption: true

patches:
  - name: global-settings
    file: patches/global-settings.yaml
  - name: manifests
    file: patches/extraManifests-dev.yaml

---
###############################################################################
## Control Plane definition (auto-provisioned via Proxmox)
###############################################################################
kind: ControlPlane
name: control-plane-auto
machineClass:
  name: control-plane-auto-dev
  size: 0

systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/i915
  - siderolabs/intel-ucode
  - siderolabs/nvidia-open-gpu-kernel-modules-lts
  - siderolabs/iscsi-tools
  - siderolabs/zfs

patches:
  - name: control-plane-settings
    file: patches/control-plane-settings.yaml

---
###############################################################################
## Control Plane definition (manual)
###############################################################################
kind: ControlPlane
name: control-plane-manual
machineClass:
  name: control-plane-manual-dev
  size: 3

patches:
  - name: control-plane-settings
    file: patches/control-plane-settings.yaml

---
###############################################################################
## Data plane definition (auto-provisioned via Proxmox)
###############################################################################
kind: Workers
name: data-plane-auto
machineClass:
  name: data-plane-auto-dev
  size: 0

systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/i915
  - siderolabs/intel-ucode
  - siderolabs/nvidia-open-gpu-kernel-modules-lts
  - siderolabs/iscsi-tools
  - siderolabs/zfs

## Update Strategies: critical for storage nodes: Ensure only one node reboots at a time
updateStrategy:
  rolling:
    maxParallelism: 1
deleteStrategy:
  type: Rolling
  rolling:
    maxParallelism: 1

patches:
  - name: data-plane-settings
    file: patches/data-plane-settings.yaml

---
###############################################################################
## Data plane definition (manual)
###############################################################################
kind: Workers
name: data-plane-manual
machineClass:
  name: data-plane-manual-dev
  size: 3

## Update Strategies: critical for storage nodes: Ensure only one node reboots at a time
updateStrategy:
  rolling:
    maxParallelism: 1
deleteStrategy:
  type: Rolling
  rolling:
    maxParallelism: 1

patches:
  - name: data-plane-settings
    file: patches/data-plane-settings.yaml
