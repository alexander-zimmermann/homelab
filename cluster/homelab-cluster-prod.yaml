###############################################################################
## Global cluster definition
###############################################################################
kind: Cluster
name: homelab-prod
kubernetes:
  version: v1.33.10
talos:
  version: v1.12.6
features:
  diskEncryption: true

patches:
  - name: global-settings
    file: patches/global-settings.yaml
  - name: manifests
    file: patches/extraManifests-prod.yaml

---
###############################################################################
## Control plane definition
###############################################################################
kind: ControlPlane
machineClass:
  name: control-plane-prod
  size: 3

systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/i915
  - siderolabs/intel-ucode
  - siderolabs/nvidia-open-gpu-kernel-modules-lts
  - siderolabs/iscsi-tools
  - siderolabs/zfs

patches:
  - name: control-plane-settings
    file: patches/control-plane-settings.yaml

---
###############################################################################
## Data plane definition
###############################################################################
kind: Workers
name: data-plane
machineClass:
  name: data-plane-prod
  size: 3

systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/i915
  - siderolabs/intel-ucode
  - siderolabs/nvidia-open-gpu-kernel-modules-lts
  - siderolabs/iscsi-tools
  - siderolabs/zfs

## Update Strategies: critical for storage nodes: Ensure only one node reboots at a time
updateStrategy:
  rolling:
    maxParallelism: 1
deleteStrategy:
  type: Rolling
  rolling:
    maxParallelism: 1

patches:
  - name: data-plane-settings
    file: patches/data-plane-settings.yaml
