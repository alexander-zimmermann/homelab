###############################################################################
## Production machine classes
###############################################################################
metadata:
  id: control-plane-prod
  type: MachineClasses.omni.sidero.dev
  namespace: default
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox-infra
    kernelargs: []
    metavalues: []
    providerdata: |
      # Resource allocation
      cores: 4
      sockets: 1
      memory: 4096
      disk_size: 32

      # CPU & memory optimizations
      cpu_type: host
      machine_type: q35
      numa: true
      balloon: false

      # Storage configuration
      storage_selector: name == "local-zfs"
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring

      # Network configuration
      network_bridge: vmbr0

---
metadata:
  id: data-plane-prod
  type: MachineClasses.omni.sidero.dev
  namespace: default
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox-infra
    kernelargs: []
    metavalues: []
    providerdata: |
      # Resource allocation
      sockets: 1
      cores: 6
      memory: 10240
      disk_size: 64

      # CPU & memory optimizations
      cpu_type: host
      machine_type: q35
      numa: true
      balloon: false

      # Storage configuration
      storage_selector: name == "local-zfs"
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring

      # Additional storage for Longhorn & Swap
      additional_disks:
        - disk_size: 128
          storage_selector: name == "local-zfs"
          disk_ssd: true
          disk_discard: true
          disk_iothread: true
          disk_cache: none
          disk_aio: io_uring
        - disk_size: 4
          storage_selector: name == "local-zfs"
          disk_ssd: true
          disk_discard: true
          disk_iothread: true
          disk_cache: none
          disk_aio: io_uring

      # Network configuration
      network_bridge: vmbr0

