apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/name: alloy-k8s-monitoring-remove-alloy-and-finalizer
    helm.sh/chart: k8s-monitoring-3.8.0
    homelab.app: alloy
  name: alloy-k8s-monitoring-remove-alloy-and-finalizer
  namespace: alloy
spec:
  backoffLimit: 3
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      labels:
        app.kubernetes.io/instance: alloy
        app.kubernetes.io/name: alloy-k8s-monitoring
        linkerd.io/inject: disabled
        sidecar.istio.io/inject: "false"
      name: alloy-k8s-monitoring-remove-alloy-and-finalizer
    spec:
      containers:
      - command:
        - /bin/bash
        - -ce
        - |
          echo "Deleting Alloy instance: alloy/alloy-alloy-metrics..."
          kubectl delete alloy/alloy-alloy-metrics --ignore-not-found=true --wait
          kubectl wait --for=delete alloy/alloy-alloy-metrics --timeout=60s || echo "Timed out waiting for deletion of alloy/alloy-alloy-metrics or it may not exist."

          echo "Deleting Alloy instance: alloy/alloy-alloy-singleton..."
          kubectl delete alloy/alloy-alloy-singleton --ignore-not-found=true --wait
          kubectl wait --for=delete alloy/alloy-alloy-singleton --timeout=60s || echo "Timed out waiting for deletion of alloy/alloy-alloy-singleton or it may not exist."

          echo "Deleting Alloy instance: alloy/alloy-alloy-logs..."
          kubectl delete alloy/alloy-alloy-logs --ignore-not-found=true --wait
          kubectl wait --for=delete alloy/alloy-alloy-logs --timeout=60s || echo "Timed out waiting for deletion of alloy/alloy-alloy-logs or it may not exist."

          kubectl patch \
            --namespace=alloy \
            --type json \
            --patch='[{"op": "remove", "path": "/metadata/finalizers"}]' \
            deployment/alloy-alloy-operator
        image: ghcr.io/grafana/helm-chart-toolbox-kubectl:0.1.2
        imagePullPolicy: IfNotPresent
        name: remove-finalizers
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 4242
          seccompProfile:
            type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Never
      serviceAccountName: alloy-k8s-monitoring-remove-alloy-and-finalizer
  ttlSecondsAfterFinished: 300
