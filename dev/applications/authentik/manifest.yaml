apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    homelab.app: authentik
  name: create-authentik-backup-bucket
  namespace: authentik
spec:
  backoffLimit: 2
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "4"
    spec:
      containers:
      - args:
        - |
          set -euo pipefail
          mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 "$ACCESS_KEY" "$SECRET_KEY"
          mc mb rustfs/authentik-backups --ignore-existing
          mc version enable rustfs/authentik-backups
        command:
        - /bin/sh
        - -c
        env:
        - name: ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: access-key
              name: rustfs-creds
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: secret-key
              name: rustfs-creds
        image: minio/mc:latest
        imagePullPolicy: IfNotPresent
        name: mc
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
      initContainers:
      - args:
        - |
          until curl -sSf http://rustfs-svc.rustfs.svc.cluster.local:9000/health >/dev/null; do
            echo "Warte auf S3 Endpoint..."
            sleep 3
          done
        command:
        - /bin/sh
        - -c
        image: curlimages/curl:8.9.1
        name: wait-for-s3
      restartPolicy: OnFailure
      serviceAccountName: default
  ttlSecondsAfterFinished: 3600
