apiVersion: v1
kind: Namespace
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: smtprelay
  name: smtprelay
---
apiVersion: v1
data:
  smtprelay.ini: |
    ; smtprelay configuration

    ; Logfile
    ;logfile = /dev/stdout

    ; Minimum log level to write to Logfile
    ;log_level = "debug"

    ; Hostname for this SMTP server
    ;hostname = "localhost.localdomain"

    ; Welcome message for clients
    ;welcome_msg = "<hostname> ESMTP ready."

    ; Listen on the following addresses for incoming
    ; unencrypted connections.
    listen = :2525

    ; STARTTLS and TLS are also supported but need a
    ; SSL certificate and key.
    ;listen = tls://127.0.0.1:465 tls://[::1]:465
    ;listen = starttls://127.0.0.1:587 starttls://[::1]:587
    ;local_cert = smtpd.pem
    ;local_key  = smtpd.key

    ; Listen on the following address for Prometheus
    ; metrics exposition
    ;metrics_listen = :8080

    ; Enforce encrypted connection on STARTTLS ports before
    ; accepting mails from client.
    ;local_forcetls = false

    ; Networks that are allowed to send mails to us
    ; Defaults to localhost. If set to "", then any address is allowed.
    allowed_nets = 10.0.0.0/8 192.168.0.0/16 127.0.0.0/8

    ; Regular expression for valid FROM EMail addresses
    ; Example: ^(.*)@localhost.localdomain$
    ;allowed_sender =

    ; Regular expression for valid TO EMail addresses
    ; Example: ^(.*)@localhost.localdomain$
    ;allowed_recipients =

    ; File which contains username and password used for
    ; authentication before they can send mail.
    ; File format: username bcrypt-hash [email[,email[,...]]]
    ;   username: The SMTP auth username
    ;   bcrypt-hash: The bcrypt hash of the pasword (generate with "./hasher password")
    ;   email: Comma-separated list of allowed "from" addresses:
    ;          - Ignored if allowed_sender is not set
    ;          - If omitted, user can send from any address
    ;          - If @domain.com is given, user can send from any address @domain.com
    ;          - Otherwise, email address must match exactly (case-insensitive)
    ;          E.g. "app@example.com,@appsrv.example.com"
    ;allowed_users =

    ; Relay all mails to this SMTP server

    ; GMail
    ;remote_host = smtp.gmail.com:587

    ; Mailgun.org
    ;remote_host = smtp.mailgun.org:587

    ; Mailjet.com
    ;remote_host = in-v3.mailjet.com:587

    ; iCloud
    remote_host = smtp.mail.me.com:587

    ; Authentication credentials on outgoing SMTP server
    ;remote_user =
    ;remote_pass =
    #import /etc/smtprelay/secrets/secrets.ini

    ; Authentication method on outgoing SMTP server
    ; (plain, login)
    ;remote_auth = plain

    ; Sender e-mail address on outgoing SMTP server
    ;remote_sender =

    ; Max message size in bytes
    ;max_message_size = 51200000

    ; Max number of concurrent connections, use -1 to disable
    ;max_connections = 100

    ; Max number of recipients per email
    ;max_recipients = 100

    ; Socket timeouts for read, write, or DATA commands
    ;read_timeout = 60s
    ;write_timeout = 60s
    ;data_timeout = 5m

    ; Log extracted mail headers (key=value pairs, where key is the log field, and
    ; value is the header name)
    ;log_header = subject=Subject msg_id=Message-Id ua=User-Agent

    ; Enable rate limiting
    ;rate_limit_enabled = true

    ; Number of messages allowed per second per sender
    ;rate_limit_messages_per_second = 10

    ; Burst size for rate limiting
    ;rate_limit_burst = 5

    ; Header to extract sender identity for rate limiting.
    ; By default, the sender address is used.
    ;rate_limit_header = X-Sender-ID
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: smtprelay
  name: smtprelay-config-2gc2g6bbgd
  namespace: smtprelay
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    bgp.cilium.io/advertise-service: default
    bgp.cilium.io/ip-pool: default
    homelab.app: smtprelay
  name: smtprelay
  namespace: smtprelay
spec:
  ports:
  - name: smtp
    port: 25
    protocol: TCP
    targetPort: 2525
  selector:
    app.kubernetes.io/name: smtprelay
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: smtprelay
  name: smtprelay
  namespace: smtprelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtprelay
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      labels:
        app: smtprelay
    spec:
      containers:
      - args:
        - -config=/etc/smtprelay/config/smtprelay.ini
        env:
        - name: OTEL_SDK_DISABLED
          value: "true"
        image: grafana/smtprelay:latest
        name: smtprelay
        ports:
        - containerPort: 2525
          name: smtp
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 50Mi
        volumeMounts:
        - mountPath: /etc/smtprelay/config
          name: config-volume
        - mountPath: /etc/smtprelay/secrets
          name: secret-volume
          readOnly: true
      volumes:
      - configMap:
          name: smtprelay-config-2gc2g6bbgd
        name: config-volume
      - name: secret-volume
        secret:
          secretName: smtprelay-icloud-credentials
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: smtprelay
  name: smtprelay-icloud-credentials
  namespace: smtprelay
spec:
  encryptedData:
    secrets.ini: 
  template:
    metadata:
      name: smtprelay-icloud-credentials
      namespace: smtprelay
    type: Opaque
