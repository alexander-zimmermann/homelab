  name: loadbalancer-services
  namespace: cilium
spec:
  advertisements:
  - advertisementType: Service
    selector:
      matchLabels:
        bgp.cilium.io/advertise-service: default
    service:
      addresses:
      - LoadBalancerIP
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  name: cilium-unifi
  namespace: cilium
spec:
  bgpInstances:
  - localASN: 65200
    name: "65200"
    peers:
    - name: udm-pro-65100
      peerASN: 65100
      peerAddress: 192.168.1.1
      peerConfigRef:
        name: peer-config
  nodeSelector:
    matchLabels: {}
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  name: peer-config
  namespace: cilium
spec:
  authSecretRef: bgp-peer-password
  families:
  - advertisements:
      matchLabels:
        bgp.cilium.io/advertise: loadbalancer-services
    afi: ipv4
    safi: unicast
  gracefulRestart:
    enabled: true
---
apiVersion: cilium.io/v2
