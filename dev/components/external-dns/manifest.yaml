apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/instance: external-dns
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: external-dns-chart
    app.kubernetes.io/version: 0.20.0
    helm.sh/chart: external-dns-chart-1.20.0
    homelab.component: external-dns
  name: external-dns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: external-dns
      app.kubernetes.io/name: external-dns-chart
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-2"
      labels:
        app.kubernetes.io/instance: external-dns
        app.kubernetes.io/name: external-dns-chart
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - --log-level=info
        - --log-format=text
        - --interval=1m
        - --source=service
        - --source=ingress
        - --source=traefik-proxy
        - --policy=upsert-only
        - --registry=txt
        - --txt-owner-id=homelab
        - --txt-suffix=-prod
        - --domain-filter=zimmermann.sh
        - --domain-filter=zimmermann.eu.com
        - --provider=cloudflare
        - --cloudflare-proxied
        env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              key: cf-api-token
              name: external-dns-cf-credentials
        image: dhi.io/external-dns:0.20.0-debian13@sha256:31a18ef58acce2ee714336e58d8784c7c4bfd0b02028a29df5874dfd614922ba
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 2
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: external-dns
        ports:
        - containerPort: 7979
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
      imagePullSecrets:
      - name: dhi-registry-secret
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: external-dns
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    homelab.component: external-dns
  name: external-dns-cf-credentials
  namespace: external-dns
spec:
  encryptedData:
    cf-api-token: 
  template:
    metadata:
      name: external-dns-cf-credentials
      namespace: external-dns
    type: Opaque
