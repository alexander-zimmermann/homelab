ci_user_config:
  ## Standard Linux VM
  std_linux:
    - username: alexander
      groups: [sudo]
      ssh_public_key: ~/.ssh/id_rsa.pub
      set_password: false
      password: ""

  ## Cluster management VM (Omni)
  cluster_mgmt:
    - username: omni
      groups: [sudo, docker]
      set_password: false

    - username: alexander
      groups: [sudo, docker, omni]
      ssh_public_key: ~/.ssh/id_rsa.pub
      set_password: false
      password: ""

  ## Proxmox Backup Server VM
  proxmox_backup_server:
    - username: alexander
      groups: [sudo]
      ssh_public_key: ~/.ssh/id_rsa.pub
      set_password: false
      password: ""
