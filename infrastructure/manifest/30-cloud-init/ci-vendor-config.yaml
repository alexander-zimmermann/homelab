ci_vendor_config:
  ## Standard Linux VM
  std_linux:
    packages:
      - qemu-guest-agent
      - htop
      - vim

    runcmd:
      - systemctl enable --now qemu-guest-agent

  ## Cluster management VM (Omni)
  cluster_mgmt:
    packages:
      - qemu-guest-agent
      - htop
      - vim
      - nfs-common
      - docker.io
      - docker-compose-v2
      - curl
      - snapd

    snap:
      commands:
        - ["install", "task", "--classic"]
        - ["install", "lego", "--classic"]

    disk_setup:
      /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi2:
        table_type: gpt
        layout: true
        overwrite: false
      /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1:
        table_type: gpt
        layout: true
        overwrite: false

    fs_setup:
      - label: omni_data
        filesystem: ext4
        device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi2
        partition: auto
      - label: swap
        filesystem: swap
        device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1
        partition: auto

    mounts:
      - ["LABEL=omni_data", "/mnt/omni"]
      - ["LABEL=swap", "none", "swap", "sw", "0", "0"]
      - [
          "storage.zimmermann.eu.com:/var/nfs/shared/omni",
          "/mnt/backup",
          "nfs",
          "defaults,_netdev,noauto,nofail,vers=3,rw,nolock,x-systemd.after=cloud-init-network.service",
          "0",
          "0",
        ]

    mount_default_fields: [None, None, "auto", "defaults", "0", "0"]

    bootcmd:
      - mkdir -p /opt/omni
      - mkdir -p /mnt/omni
      - mkdir -p /mnt/backup

    runcmd:
      ## Symlinks for snap packages
      - ["ln", "-s", "/snap/bin/lego", "/usr/local/bin/lego"]
      - ["ln", "-s", "/snap/bin/task", "/usr/local/bin/task"]
      ## Manually mount NFS share (after nfs-common install)
      - ["mount", "/mnt/backup"]
      ## Set permissions for data disk and config directory
      - ["chown", "-R", "omni:omni", "/opt/omni"]
      - ["chown", "-R", "omni:omni", "/mnt/omni"]
      - ["chown", "-R", "omni:omni", "/etc/omni"]
      ## Setup Omni
      - ["bash", "/usr/local/bin/omni-bootstrap.sh"]
      ## Systemd services
      - ["systemctl", "enable", "--now", "qemu-guest-agent"]
      - ["systemctl", "enable", "--now", "docker"]
      - ["systemctl", "enable", "--now", "omni-renew-cert.timer"]
      - ["systemctl", "enable", "--now", "omni-rotate-sa-key.timer"]
      - ["systemctl", "enable", "--now", "omni-rotate-ip-key.timer"]

    write_files:
      ## Omni configuration
      - path: /etc/omni/omni.conf
        template_file: templates/30-cloud-init/cluster-mgmt/config/omni.conf.tftpl
        secret_ref: omni_config
        permissions: "0640"
        owner: "omni:omni"
        defer: true

      ## Omni bootstrap script
      - path: /usr/local/bin/omni-bootstrap.sh
        content_file: templates/30-cloud-init/cluster-mgmt/omni-bootstrap.sh
        permissions: "0755"
        owner: "omni:omni"
        defer: true

      ## Systemd service for renewing SSL certificates (Lego)
      - path: /etc/systemd/system/omni-renew-cert.service
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-renew-cert.service

      - path: /etc/systemd/system/omni-renew-cert.timer
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-renew-cert.timer

      - path: /usr/local/bin/omni-renew-cert.sh
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-renew-cert.sh
        permissions: "0755"
        owner: "omni:omni"
        defer: true

      ## Systemd service for Omni Service Account key rotation
      - path: /etc/systemd/system/omni-rotate-sa-key.service
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-sa-key.service

      - path: /etc/systemd/system/omni-rotate-sa-key.timer
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-sa-key.timer

      - path: /usr/local/bin/omni-rotate-sa-key.sh
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-sa-key.sh
        permissions: "0755"
        owner: "omni:omni"
        defer: true

      ## Systemd service for Omni Infra Provider key rotation
      - path: /etc/systemd/system/omni-rotate-ip-key.service
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-ip-key.service

      - path: /etc/systemd/system/omni-rotate-ip-key.timer
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-ip-key.timer

      - path: /usr/local/bin/omni-rotate-ip-key.sh
        content_file: templates/30-cloud-init/cluster-mgmt/systemd/omni-rotate-ip-key.sh
        permissions: "0755"
        defer: true

      ## Omni Docker Compose
      - path: /opt/omni/compose.yaml
        content_file: templates/30-cloud-init/cluster-mgmt/docker/omni-compose.yaml
        permissions: "0644"
        owner: "omni:omni"
        defer: true

      ## Docker secrets
      - path: /opt/omni/.secrets/backup-notification-url
        template_file: templates/30-cloud-init/cluster-mgmt/docker/secrets/backup-notification-url.tftpl
        secret_ref: backup_notification_url
        permissions: "0640"
        owner: "omni:omni"
        defer: true

      - path: /opt/omni/.secrets/omni-proxmox-config.yaml
        template_file: templates/30-cloud-init/cluster-mgmt/docker/secrets/omni-proxmox-config.yaml.tftpl
        secret_ref: omni_proxmox_config
        permissions: "0640"
        owner: "omni:omni"
        defer: true

  ## Proxmox Backup Server VM
  proxmox_backup_server:
    packages:
      - qemu-guest-agent
      - htop
      - vim

    disk_setup:
      /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi2:
        table_type: gpt
        layout: true
        overwrite: false

    fs_setup:
      - label: swap
        filesystem: swap
        device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi2
        partition: auto

    mounts:
      - ["LABEL=swap", "none", "swap", "sw", "0", "0"]

    runcmd:
      - systemctl enable --now qemu-guest-agent
