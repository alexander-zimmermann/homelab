fleet_vm:
  ## Linux VM fleets
  ubuntu_01:
    template_id: vm_ubuntu_noble
    vm_id: 1001

  ## Cluster management VM (Omni)
  cluster_mgmt_01:
    template_id: vm_ubuntu_noble_cluster-mgmt
    vm_id: 1002
    disks:
      - disk_interface: scsi1
        disk_size: 16
      - disk_interface: scsi2
        disk_size: 8

  ## Proxmox Backup Server VM
  proxmox_backup_server_01:
    template_id: vm_proxmox_backup_server
    vm_id: 1003
    disks:
      - disk_interface: scsi1
        disk_size: 128
      - disk_interface: scsi2
        disk_size: 8

  ## Windows VM fleets
  windows_01:
    template_id: vm_windows_11_25h2
    vm_id: 1100
    wait_for_agent: false

  ## Talos production cluster
  talos_cp:
    template_id: vm_talos_1_12_2_cp-prod
    count: 3
    vm_id_start: 2000

  talos_dp:
    template_id: vm_talos_1_12_2_dp-prod
    count: 3
    vm_id_start: 2100
    disks:
      - disk_interface: scsi1
        disk_size: 128
      - disk_interface: scsi2
        disk_size: 4
