cluster:
  name: homelab

global:
  scrapeInterval: 60s

# Remote write / push endpoints for metrics and logs.
destinations:
  prometheus:
    type: prometheus
    url: http://prometheus-operated.prometheus:9090/api/v1/write
  loki:
    type: loki
    url: http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push
    header:
      batchSize: 256KiB
      batchWait: 1s

# Cluster metrics & events
clusterMetrics:
  enabled: true
  destinations:
    - prometheus
  collector: alloy-metrics

clusterEvents:
  enabled: true
  destinations:
    - loki
  collector: alloy-singleton

# Node & pod logs
nodeLogs:
  enabled: true
  destinations:
    - loki
  collector: alloy-logs

podLogsViaLoki:
  enabled: true
  destinations:
    - loki
  collector: alloy-logs

# Additional telemetry services
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true

collectors:
  # Alloy Metrics: Cluster metrics & events
  alloy-metrics:
    presets:
      - clustered
      - statefulset
    # Expose Alloy Metrics service via Cilium/BGP-announced LoadBalancer
    alloy:
      service:
        type: LoadBalancer
        labels:
          bgp.cilium.io/ip-pool: default
          bgp.cilium.io/advertise-service: default

  # Alloy Singleton: Per-cluster tasks like event processing
  alloy-singleton:
    presets:
      - singleton

  # Alloy Logs: Collects and forwards logs to Loki
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset

  # Alloy Receiver: Opens receivers for external data sources (syslog, OTLP)
  alloy-receiver:
    # Include loki for syslog forwarding and prometheus for OTLP metric forwarding
    includeDestinations:
      - loki
      - prometheus
    # Expose Alloy Receiver via Cilium/BGP-announced LoadBalancer
    alloy:
      service:
        type: LoadBalancer
        labels:
          bgp.cilium.io/ip-pool: default
          bgp.cilium.io/advertise-service: default
      # Syslog: TCP 601 / UDP 514 (RFC5424). OTLP HTTP: 4318 (rustfs metrics push).
      extraPorts:
        - name: syslog-tcp
          port: 601
          targetPort: 601
          protocol: TCP
        - name: syslog-udp
          port: 514
          targetPort: 514
          protocol: UDP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
    extraConfig: |
      discovery.relabel "syslog" {
          targets = []

          rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "host"
          }

          rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "hostname"
          }

          rule {
              source_labels = ["__syslog_message_severity"]
              target_label  = "level"
          }

          rule {
              source_labels = ["__syslog_message_app_name"]
              target_label  = "application"
          }

          rule {
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
          }

          rule {
              source_labels = ["__syslog_connection_hostname"]
              target_label  = "connection_hostname"
          }
      }

      loki.source.syslog "syslog" {
          listener {
              address             = "0.0.0.0:601"
              protocol            = "tcp"
              idle_timeout        = "0s"
              use_rfc5424_message = true
              labels              = {
                  job       = "syslog",
                  component = "loki.source.syslog",
                  protocol  = "tcp",
              }
          }

          listener {
              address             = "0.0.0.0:514"
              protocol            = "udp"
              idle_timeout        = "0s"
              use_rfc5424_message = true
              labels              = {
                  job       = "syslog",
                  component = "loki.source.syslog",
                  protocol  = "udp",
              }
          }

          forward_to    = [loki.write.loki.receiver]
          relabel_rules = discovery.relabel.syslog.rules
      }

      // OTLP/HTTP receiver for rustfs metrics; forwarded to the chart-rendered
      // otelcol.exporter.prometheus.prometheus exporter for remote-write.
      otelcol.receiver.otlp "rustfs" {
          http {
              endpoint = "0.0.0.0:4318"
          }
          output {
              metrics = [otelcol.processor.batch.rustfs.input]
          }
      }

      otelcol.processor.batch "rustfs" {
          output {
              metrics = [otelcol.exporter.prometheus.prometheus.input]
          }
      }
