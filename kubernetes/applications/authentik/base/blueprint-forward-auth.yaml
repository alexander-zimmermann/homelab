version: 1
metadata:
  name: forward-auth-proxy
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # Generic Proxy Provider for Traefik ForwardAuth — shared across all internal services
  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: forward-auth-proxy
    attrs:
      name: forward-auth-proxy
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_domain
      # Covers all subdomains on both prod and dev
      cookie_domain: zimmermann.sh
      external_host: https://auth.zimmermann.sh/outpost.goauthentik.io/

  # Application entry in Authentik's app library
  - model: authentik_core.application
    state: present
    identifiers:
      slug: forward-auth-proxy
    attrs:
      name: forward-auth-proxy
      slug: forward-auth-proxy
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, forward-auth-proxy]]
      policy_engine_mode: any
