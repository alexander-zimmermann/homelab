version: 1
metadata:
  name: iot-mcp-bridge-oidc
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # OAuth2/OIDC Provider for the iot-mcp-bridge MCP server.
  # Used by claude.ai's custom-connector OAuth flow (oauth_anthropic_creds).
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: iot-mcp-bridge
    attrs:
      name: iot-mcp-bridge
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: iot-mcp-bridge
      client_secret: !Env IOT_MCP_BRIDGE_OIDC_CLIENT_SECRET
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Anthropic does not document the exact callback URL claude.ai uses for
      # custom connectors. Start permissive (regex) so the first OAuth round-
      # trip succeeds; once the real URL appears in Authentik → Events,
      # tighten this back to matching_mode: strict with the literal URL stored
      # in ANTHROPIC_OAUTH_REDIRECT_URI.
      redirect_uris:
        - matching_mode: regex
          url: !Env ANTHROPIC_OAUTH_REDIRECT_URI
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

  # Application entry in Authentik's app library
  - model: authentik_core.application
    state: present
    identifiers:
      slug: iot-mcp-bridge
    attrs:
      name: iot-mcp-bridge
      slug: iot-mcp-bridge
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, iot-mcp-bridge]]
      policy_engine_mode: any
