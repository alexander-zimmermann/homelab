apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: authentik-db
  namespace: authentik

spec:
  instances: 2

  # Registry authentication for dhi.io images
  imagePullSecrets:
    - name: dhi-registry-secret

  # PostgreSQL version and configuration
  imageName: ghcr.io/cloudnative-pg/postgresql:16.1

  # Rolling update process is managed by Kubernetes
  primaryUpdateStrategy: unsupervised

  # Storage configuration
  storage:
    storageClass: longhorn-postgres
    size: PLACEHOLDER
  walStorage:
    storageClass: longhorn-postgres
    size: PLACEHOLDER

  # Use non-reusable PVCs for improved failover/rebalance behavior
  nodeMaintenanceWindow:
    reusePVC: false

  # Bootstrap from scratch or restore from backup
  bootstrap:
    initdb:
      database: authentik
      owner: authentik

  postgresql:
    parameters:
      # Memory settings
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      autovacuum_work_mem: "128MB"

      # WAL settings
      wal_buffers: "16MB"
      max_wal_size: PLACEHOLDER
      min_wal_size: "80MB"
      wal_keep_size: "128MB"
      wal_compression: "on"

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-backups
        serverName: PLACEHOLDER
        s3-force-path-style: "true"

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup

metadata:
  name: authentik-db-daily
  namespace: authentik
spec:
  schedule: "0 0 2 * * *"
  immediate: false
  backupOwnerReference: cluster
  cluster:
    name: authentik-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io

---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore

metadata:
  name: authentik-backups
  namespace: authentik
spec:
  configuration:
    destinationPath: s3://authentik-backups
    endpointURL: http://rustfs-svc.rustfs.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        name: rustfs-admin-credentials
        key: RUSTFS_ACCESS_KEY
      secretAccessKey:
        name: rustfs-admin-credentials
        key: RUSTFS_SECRET_KEY
    wal:
      compression: bzip2
      maxParallel: 2
    data:
      compression: bzip2
  retentionPolicy: "14d"

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor

metadata:
  name: authentik-db
  namespace: authentik
  # Prometheus Operator label (Opt-In)
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: authentik-db
  podMetricsEndpoints:
    - port: metrics
