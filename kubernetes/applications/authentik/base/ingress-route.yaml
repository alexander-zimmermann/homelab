apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: authentik
  namespace: authentik
  labels:
  annotations:
    # ExternalDNS configuration for Cloudflare
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    kubernetes.io/ingress.class: traefik
    # Homepage Service Discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Security & Identity"
    gethomepage.dev/name: "Authentik"
    gethomepage.dev/icon: "authentik.png"
    gethomepage.dev/weight: "1"
    gethomepage.dev/href: "https://PLACEHOLDER"
    gethomepage.dev/widget.type: "authentik"
    gethomepage.dev/widget.version: "2"
    gethomepage.dev/widget.url: "http://authentik-server.authentik.svc.cluster.local"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_AUTHENTIK_KEY}}"
    # Gatus — automated status page discovery (probes via /_gatus path with CF Access Service Token)
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      group: Security & Identity
      url: https://PLACEHOLDER/_gatus
      interval: 60s
      client:
        headers:
          CF-Access-Client-Id: "${CF_ACCESS_CLIENT_ID}"
          CF-Access-Client-Secret: "${CF_ACCESS_CLIENT_SECRET}"
      conditions:
        - "[STATUS] < 500"
        - "[RESPONSE_TIME] < 1500"
      alerts:
        - type: pushover

spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`PLACEHOLDER`)
      priority: 10
      services:
        - kind: Service
          name: authentik-server
          port: 80
    # Gatus bypass route — matches only requests that went through Cloudflare Access (JWT header set by CF)
    - kind: Rule
      match: Host(`PLACEHOLDER`) && PathPrefix(`/_gatus`) && HeadersRegexp(`Cf-Access-Jwt-Assertion`, `.+`)
      priority: 20
      services:
        - kind: Service
          name: authentik-server
          port: 80
  tls:
    secretName: authentik-tls
