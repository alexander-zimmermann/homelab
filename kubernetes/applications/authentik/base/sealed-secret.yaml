apiVersion: bitnami.com/v1alpha1
kind: SealedSecret

metadata:
  name: authentik-credentials
  namespace: authentik

spec:
  encryptedData:
    AUTHENTIK_BOOTSTRAP_PASSWORD: 
    AUTHENTIK_SECRET_KEY: 
  template:
    metadata:
      name: authentik-credentials
      namespace: authentik
    type: Opaque

