global:
  env:
    # Database password from a Secret created by the CloudNativePG Cluster
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: password
    # Authentik internal secret key (signing/encryption)
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-credentials
          key: AUTHENTIK_SECRET_KEY
    # Initial bootstrap admin password
    - name: AUTHENTIK_BOOTSTRAP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-credentials
          key: AUTHENTIK_BOOTSTRAP_PASSWORD
    # GitHub OAuth credentials for the homelab-sources blueprint
    - name: AUTHENTIK_GITHUB_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: authentik-github-source
          key: AUTHENTIK_GITHUB_CLIENT_ID
    - name: AUTHENTIK_GITHUB_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: authentik-github-source
          key: AUTHENTIK_GITHUB_CLIENT_SECRET
    # ArgoCD OIDC client secret for the argocd-oidc blueprint
    - name: ARGOCD_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: argocd-oidc-secret
          key: oidc.authentik.clientSecret

    # Optimization: Fewer workers and no preloading saves RAM in small setups
    - name: AUTHENTIK_WEB__WORKERS
      value: "1"
    - name: AUTHENTIK_WEB__PRELOAD
      value: "false"
    - name: AUTHENTIK_WORKER__WORKERS
      value: "1"
    - name: AUTHENTIK_WORKER__PREFETCH_MULTIPLIER
      value: "1"
    - name: AUTHENTIK_WORKER__MAX_MEMORY_PER_CHILD
      value: "300000" # ~300 MiB limit per process
    - name: AUTHENTIK_EVENTS__RETENTION_DAYS
      value: "14"

authentik:
  # SMTP configuration for notifications and password resets
  email:
    host: smtprelay.smtprelay.svc.cluster.local
    port: 25
    from: "Authentik <admin@zimmermann.sh>"

  # PostgreSQL connection settings (external DB via CloudNativePG)
  postgresql:
    host: "{{ .Release.Name }}-db-rw"

blueprints:
  # ConfigMaps containing Authentik blueprint YAMLs (generated by kustomize configMapGenerator)
  configMaps:
    - authentik-blueprint-sources
    - authentik-blueprint-argocd

server:
  # Expose Authentik service via Cilium/BGP-announced LoadBalancer
  service:
    type: LoadBalancer
    labels:
      bgp.cilium.io/ip-pool: default
      bgp.cilium.io/advertise-service: default

  metrics:
    enabled: true
    # Prometheus Monitoring
    serviceMonitor:
      enabled: true
      # Prometheus Operator label (Opt-In)
      labels:
        release: prometheus
