apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ./sealed-secret.yaml

replacements:
  # Inject domain name into Certificate, IngressRoute, and Homepage href annotation
  - sourceValue: auth.zimmermann.phd
    targets:
      - select:
          kind: Certificate
          name: authentik-tls
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: authentik
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: authentik
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1

  # Blueprint env var injections — resolved at runtime via !Env tags in blueprints
  - sourceValue: https://argocd.zimmermann.phd/auth/callback
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_ARGOCD_REDIRECT_URI].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_ARGOCD_REDIRECT_URI].value

  - sourceValue: https://auth.zimmermann.phd
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_HOST].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_HOST].value

  - sourceValue: zimmermann.phd
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_COOKIE_DOMAIN].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_COOKIE_DOMAIN].value

  # Inject database storage size
  - sourceValue: 1Gi
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.storage.size

  # Inject database WAL storage size
  - sourceValue: 512Mi
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.walStorage.size

  # Inject safe max_wal_size based on WAL PVC (80% rule)
  - sourceValue: "400MB"
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.postgresql.parameters.max_wal_size

  # Inject WAL archive server name to be unique per environment
  - sourceValue: authentik-db-dev
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.plugins.0.parameters.serverName

patches:
  # Authentik server manages API access and primary logic
  - target:
      kind: Deployment
      name: authentik-server
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: server
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi

  # Authentik worker handles background tasks and async operations
  - target:
      kind: Deployment
      name: authentik-worker
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: worker
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi

  # PostgreSQL Cluster resources optimized for stability
  - target:
      kind: Cluster
      name: authentik-db
    patch: |-
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
