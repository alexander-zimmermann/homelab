apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ./sealed-secret.yaml

replacements:
  # Inject domain name into Certificate, IngressRoute, Homepage href, and blueprint env vars
  - sourceValue: auth.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: authentik-tls
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: authentik
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: authentik
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1

  # Blueprint env var injections — resolved at runtime via !Env tags in blueprints
  - sourceValue: https://argocd.zimmermann.sh/auth/callback
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_ARGOCD_REDIRECT_URI].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_ARGOCD_REDIRECT_URI].value

  - sourceValue: https://grafana.zimmermann.sh/login/generic_oauth
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_GRAFANA_REDIRECT_URI].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_GRAFANA_REDIRECT_URI].value

  - sourceValue: https://node-red.zimmermann.sh/auth/strategy/callback/
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_NODE_RED_REDIRECT_URI].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_NODE_RED_REDIRECT_URI].value

  - sourceValue: https://wiki.zimmermann.sh/login/oidc/callback
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_WIKIJS_REDIRECT_URI].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_WIKIJS_REDIRECT_URI].value

  - sourceValue: https://auth.zimmermann.sh
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_HOST].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_HOST].value

  - sourceValue: zimmermann.sh
    targets:
      - select:
          kind: Deployment
          name: authentik-worker
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_COOKIE_DOMAIN].value
      - select:
          kind: Deployment
          name: authentik-server
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=AUTHENTIK_COOKIE_DOMAIN].value

  # Inject database storage size
  - sourceValue: 2Gi
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.storage.size

  # Inject database WAL storage size
  - sourceValue: 1Gi
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.walStorage.size

  # Inject safe max_wal_size based on WAL PVC (80% rule)
  - sourceValue: "800MB"
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.postgresql.parameters.max_wal_size

  # Inject WAL archive server name to be unique per environment
  - sourceValue: authentik-db-prod
    targets:
      - select:
          kind: Cluster
          name: authentik-db
        fieldPaths:
          - spec.plugins.0.parameters.serverName

patches:
  # Authentik server manages API access and primary logic
  - target:
      kind: Deployment
      name: authentik-server
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: server
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  # Authentik worker handles background tasks
  - target:
      kind: Deployment
      name: authentik-worker
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: worker
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  # PostgreSQL Cluster resources optimized for stability
  - target:
      kind: Cluster
      name: authentik-db
    patch: |-
      - op: test
        path: /spec/instances
        value: 2
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

  # Authentik service with static IP and BGP advertisement
  - target:
      kind: Service
      name: authentik-server
    patch: |-
      - op: test
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /metadata/annotations/io.cilium~1lb-ipam-ips
        value: "192.168.10.30"
