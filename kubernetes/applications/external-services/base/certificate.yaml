apiVersion: cert-manager.io/v1
kind: Certificate

metadata:
  name: proxmox-tls-cert
  namespace: external-services

spec:
  secretName: proxmox-tls-cert
  issuerRef:
    name: letsencrypt-dns01-issuer
    kind: ClusterIssuer
  dnsNames:
    - proxmox.zimmermann.sh

