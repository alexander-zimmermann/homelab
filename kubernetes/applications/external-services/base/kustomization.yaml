apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-services

resources:
  - ./namespace.yaml
  - ./services.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml
  - ./servers-transport.yaml

labels:
  - includeSelectors: false
    pairs:
      homelab.component: external-services

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
