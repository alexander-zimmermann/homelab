apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and Gatus annotation
  - sourceValue: proxmox.zimmermann.phd
    targets:
      - select:
          kind: Certificate
          name: proxmox-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: proxmox
        fieldPaths:
          - spec.routes.0.match
          - spec.routes.1.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: proxmox
        fieldPaths:
          - metadata.annotations.[gatus.home-operations.com/endpoint]
        options:
          delimiter: "/"
          index: 2

