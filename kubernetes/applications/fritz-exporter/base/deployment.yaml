apiVersion: apps/v1
kind: Deployment

metadata:
  name: fritz-exporter

spec:
  # Single instance is sufficient; fritz-exporter is stateless and scrapes one FritzBox.
  replicas: 1
  selector:
    # Must match `.spec.template.metadata.labels`.
    matchLabels:
      app.kubernetes.io/name: fritz-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fritz-exporter
    spec:
      # No API access required.
      automountServiceAccountToken: false
      volumes:
        # Non-secret exporter config from ConfigMap.
        - name: fritz-exporter-config
          configMap:
            name: fritz-exporter-config
        # FritzBox credentials (password_file reference in config).
        - name: fritz-exporter-credentials
          secret:
            secretName: fritz-exporter-credentials
      containers:
        - name: fritz-exporter
          # FritzBox metrics exporter container.
          image: docker.io/pdreker/fritz_exporter:2.6.1
          args:
            - --config=/etc/fritz-exporter.yml
          ports:
            - name: metrics
              containerPort: 9787
          volumeMounts:
            # Mount the exporter config at the expected path.
            - name: fritz-exporter-config
              mountPath: /etc/fritz-exporter.yml
              subPath: fritz-exporter.yml
              readOnly: true
            # Credentials directory (read-only); referenced via password_file in config.
            - name: fritz-exporter-credentials
              mountPath: /etc/fritz-exporter/secrets
              readOnly: true
          resources:
            # Ensure Burstable QoS (no BestEffort) and prevent runaway usage.
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            # Consider the exporter ready when it serves the metrics endpoint.
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            # Restart if the metrics endpoint stops responding.
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
