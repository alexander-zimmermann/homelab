apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: gatus-db
  namespace: gatus

spec:
  instances: 2

  # PostgreSQL version and configuration
  imageName: ghcr.io/cloudnative-pg/postgresql:16.1

  # Rolling update process is managed by Kubernetes
  primaryUpdateStrategy: unsupervised

  # Storage configuration
  storage:
    storageClass: longhorn-postgres
    size: PLACEHOLDER
  walStorage:
    storageClass: longhorn-postgres
    size: PLACEHOLDER

  # Use non-reusable PVCs for improved failover/rebalance behavior
  nodeMaintenanceWindow:
    reusePVC: false

  # Bootstrap from scratch or restore from backup
  bootstrap:
    initdb:
      database: gatus
      owner: gatus

  postgresql:
    parameters:
      # Memory settings — kept low, monitor write load is minimal
      shared_buffers: "64MB"
      effective_cache_size: "256MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      autovacuum_work_mem: "64MB"

      # WAL settings
      wal_buffers: "8MB"
      max_wal_size: PLACEHOLDER
      min_wal_size: "80MB"
      wal_keep_size: "128MB"
      wal_compression: "on"

  # No Barman backup: Gatus data is re-generatable (long-term SLO history lives in Prometheus)

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor

metadata:
  name: gatus-db
  namespace: gatus
  # Prometheus Operator label (Opt-In)
  labels:
    release: prometheus

spec:
  selector:
    matchLabels:
      cnpg.io/cluster: gatus-db
  podMetricsEndpoints:
    - port: metrics
