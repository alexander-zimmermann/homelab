apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gatus
resources:
  - ./namespace.yaml
  - ./database.yaml
  - ./sealed-secret.yaml
  - ./certificate.yaml
  - ./rbac.yaml
  - ./ingress-route.yaml

helmCharts:
  - name: application
    repo: https://stakater.github.io/stakater-charts
    releaseName: gatus
    version: 6.16.1
    valuesFile: values.yaml
    namespace: gatus
    includeCRDs: true
    apiVersions:
      - monitoring.coreos.com/v1

configMapGenerator:
  - name: gatus-config
    options:
      disableNameSuffixHash: true
    files:
      - config.yaml=config/endpoints.yaml

labels:
  - includeSelectors: false
    pairs:
      homelab.app: gatus

commonAnnotations:
  argocd.argoproj.io/sync-wave: "9"
