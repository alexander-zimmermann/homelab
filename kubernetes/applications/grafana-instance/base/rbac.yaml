apiVersion: v1
kind: ServiceAccount

metadata:
  name: grafana-sa-provisioner
  namespace: grafana-instance

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: grafana-sa-provisioner
  namespace: grafana-instance
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: grafana-sa-provisioner
  namespace: grafana-instance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-sa-provisioner
subjects:
  - kind: ServiceAccount
    name: grafana-sa-provisioner
    namespace: grafana-instance
