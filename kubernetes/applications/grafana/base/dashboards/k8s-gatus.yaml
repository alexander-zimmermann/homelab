apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard

metadata:
  name: k8s-gatus
  namespace: grafana

spec:
  instanceSelector:
    matchLabels:
      homelab.app: grafana
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Gatus — automated developer-oriented status page. Based on https://grafana.com/grafana/dashboards/24379",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "gnetId": 24379,
      "graphTooltip": 0,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "tags": [],
          "targetBlank": false,
          "title": "GitHub",
          "tooltip": "",
          "type": "link",
          "url": "https://github.com/TwiN/gatus"
        }
      ],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "454b7787-9ec4-42fc-9bf7-100716723e20"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "barWidthFactor": 0.6,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "showValues": false,
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
