apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource

metadata:
  name: prometheus
  namespace: grafana

spec:
  valuesFrom: []
  datasource:
    name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-operated.prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "30s"
  instanceSelector:
    matchLabels:
      homelab.app: grafana

---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource

metadata:
  name: loki
  namespace: grafana

spec:
  valuesFrom: []
  datasource:
    name: Loki
    type: loki
    access: proxy
    url: http://loki-gateway.loki.svc:80
    isDefault: false
    editable: false
  instanceSelector:
    matchLabels:
      homelab.app: grafana

---
# InfluxDB 3 Enterprise — SQL (native, Flight SQL over gRPC/HTTP2)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource

metadata:
  name: influxdb-sql
  namespace: grafana

spec:
  valuesFrom:
    - targetPath: secureJsonData.token
      valueFrom:
        secretKeyRef:
          name: influxdb-credentials
          key: admin-token
  datasource:
    name: InfluxDB (SQL)
    type: influxdb
    access: proxy
    url: http://influxdb3.influxdb.svc.cluster.local:8181
    isDefault: false
    editable: false
    jsonData:
      version: SQL
      dbName: homelab
      httpMode: POST
  instanceSelector:
    matchLabels:
      homelab.app: grafana

---
# InfluxDB 3 Enterprise — InfluxQL (v1 compatibility, plain HTTP/1.1)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource

metadata:
  name: influxdb-influxql
  namespace: grafana

spec:
  valuesFrom:
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: influxdb-credentials
          key: admin-token
  datasource:
    name: InfluxDB (InfluxQL)
    type: influxdb
    access: proxy
    url: http://influxdb3.influxdb.svc.cluster.local:8181
    isDefault: false
    editable: false
    database: homelab
    user: ignored
    jsonData:
      version: InfluxQL
      dbName: homelab
      httpMode: POST
  instanceSelector:
    matchLabels:
      homelab.app: grafana

