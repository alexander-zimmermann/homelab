apiVersion: apps/v1
kind: Deployment

metadata:
  name: homepage
  namespace: homepage

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.12.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            # Required for Kubernetes liveness probes — pod IP must be in HOMEPAGE_ALLOWED_HOSTS.
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Domain injected via overlay replacement (delimiter: ",", index: 1).
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,PLACEHOLDER"
            # Authentik API token — cloned from authentik namespace by Kyverno.
            - name: HOMEPAGE_VAR_AUTHENTIK_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-homepage-token
                  key: AUTHENTIK_HOMEPAGE_API_TOKEN
            # CrowdSec LAPI key — cloned from crowdsec namespace by Kyverno.
            - name: HOMEPAGE_VAR_CROWDSEC_LAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-homepage-lapi-key
                  key: crowdsec_homepage_lapi_key
            # CrowdSec widget username — static value, not a secret.
            - name: HOMEPAGE_VAR_CROWDSEC_USERNAME
              value: "localhost"
          envFrom:
            # Proxmox, Unifi, and other API credentials.
            - secretRef:
                name: homepage-secrets
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            # All Homepage config files (settings, services, widgets, etc.).
            - name: homepage-config
              mountPath: /app/config
            # Custom icons served as static assets.
            - name: homepage-icons
              mountPath: /app/public/icons
            # Background images (populated via task k8s:init-homepage).
            - name: homepage-images
              mountPath: /app/public/images
            # Transient log directory.
            - name: homepage-logs
              mountPath: /app/logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage-config
        - name: homepage-icons
          configMap:
            name: homepage-icons
        - name: homepage-images
          persistentVolumeClaim:
            claimName: homepage-images
        - name: homepage-logs
          emptyDir: {}
