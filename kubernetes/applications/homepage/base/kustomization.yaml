apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homepage
resources:
  - ./namespace.yaml
  - ./rbac.yaml
  - ./persistentvolume.yaml
  - ./deployment.yaml
  - ./service.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml
  - ./sealed-secret.yaml

configMapGenerator:
  - name: homepage-config
    options:
      disableNameSuffixHash: true
    files:
      - config/bookmarks.yaml
      - config/custom.css
      - config/custom.js
      - config/docker.yaml
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml
  - name: homepage-icons
    options:
      disableNameSuffixHash: true
    files:
      - icons/2n.svg
      - icons/basalte.png
      - icons/hubble.svg
      - icons/mdt.svg
      - icons/telenot.svg
      - icons/thinkstation.png
      - icons/warp.png

labels:
  - includeSelectors: false
    pairs:
      homelab.app: homepage

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
