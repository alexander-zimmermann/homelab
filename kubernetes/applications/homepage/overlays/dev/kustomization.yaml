apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and HOMEPAGE_ALLOWED_HOSTS
  - sourceValue: www.zimmermann.phd
    targets:
      - select:
          kind: Certificate
          name: homepage-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: homepage
        fieldPaths:
          - spec.routes.0.match
          - spec.routes.1.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: homepage
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1
      - select:
          kind: IngressRoute
          name: homepage
        fieldPaths:
          - metadata.annotations.[gatus.home-operations.com/endpoint]
        options:
          delimiter: "/"
          index: 2
      - select:
          kind: Deployment
          name: homepage
        fieldPaths:
          - spec.template.spec.containers.[name=homepage].env.[name=HOMEPAGE_ALLOWED_HOSTS].value
        options:
          delimiter: ","
          index: 1

  # Inject image storage size
  - sourceValue: 50Mi
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: homepage-images
        fieldPaths:
          - spec.resources.requests.storage
