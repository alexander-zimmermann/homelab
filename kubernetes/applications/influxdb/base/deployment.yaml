apiVersion: apps/v1
kind: Deployment

metadata:
  name: influxdb
  namespace: influxdb

spec:
  # Single instance — InfluxDB 3 Core does not support horizontal scaling.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  # PVC is RWO; avoid concurrent writers during rollouts.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influxdb
    spec:
      # No Kubernetes API access required.
      automountServiceAccountToken: false
      securityContext:
        # InfluxDB 3 runs as UID/GID 1500 (carried over from v1/v2).
        runAsUser: 1500
        runAsGroup: 1500
        runAsNonRoot: true
        fsGroup: 1500
      volumes:
        # Parquet file storage and WAL.
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-data
        # Preconfigured admin token (JSON format) mounted as file.
        - name: admin-token
          secret:
            secretName: influxdb-credentials
            items:
              - key: admin-token.json
                path: admin-token.json
            defaultMode: 0400
      containers:
        - name: influxdb
          image: influxdb:3-core
          imagePullPolicy: IfNotPresent
          args:
            - influxdb3
            - serve
            - --node-id=node0
            - --object-store=file
            - --data-dir=/var/lib/influxdb3/data
            # Allow unauthenticated access to /health, /ping, /metrics for probes and scraping.
            - --disable-authz=health,ping,metrics
          env:
            # Load preconfigured admin token at startup (idempotent across restarts).
            - name: INFLUXDB3_ADMIN_TOKEN_FILE
              value: /etc/influxdb3/admin-token.json
          ports:
            - name: http
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb3/data
            - name: admin-token
              mountPath: /etc/influxdb3
              readOnly: true

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: influxdb-explorer
  namespace: influxdb

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb-explorer
  # Explorer has SQLite session state on a PVC.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influxdb-explorer
    spec:
      automountServiceAccountToken: false
      securityContext:
        # Explorer 1.7.0+ runs as non-root user 'influxui' (uid 1500);
        # fsGroup chowns the PVC on mount so /db is writable.
        runAsUser: 1500
        runAsGroup: 1500
        runAsNonRoot: true
        fsGroup: 1500
      volumes:
        # Default connection settings for the Explorer UI.
        - name: config
          configMap:
            name: influxdb-explorer-config
        # Persistent session database (SQLite).
        - name: db
          persistentVolumeClaim:
            claimName: influxdb-explorer-db
      containers:
        - name: explorer
          image: influxdata/influxdb3-ui:1.7.0
          imagePullPolicy: IfNotPresent
          args:
            - --mode=admin
          env:
            # Session secret must persist across restarts for stable logins.
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: session-secret-key
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /app-root/config/config.json
              subPath: config.json
              readOnly: true
            - name: db
              mountPath: /db
