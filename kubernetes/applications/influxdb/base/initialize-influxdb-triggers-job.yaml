# Post-sync Job that registers the hourly downsampling trigger.
# Runs after every ArgoCD sync; the script is idempotent.
# Depends on the homelab database existing (created by initialize-influxdb-databases).
apiVersion: batch/v1
kind: Job

metadata:
  name: initialize-influxdb-triggers
  namespace: influxdb
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "11"

spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      # Wait until InfluxDB 3 HTTP API is reachable before running the init script.
      initContainers:
        - name: wait-for-influxdb
          image: curlimages/curl:8.19.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              until curl -sSf "$INFLUXDB_URL/health" >/dev/null; do
                echo "Waiting for InfluxDB..."
                sleep 3
              done
          env:
            - name: INFLUXDB_URL
              value: "http://influxdb3.influxdb.svc.cluster.local:8181"
      containers:
        - name: influxdb3
          image: influxdb:3-enterprise
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/initialize-influxdb-triggers.sh"]
          env:
            - name: INFLUXDB_URL
              value: "http://influxdb3.influxdb.svc.cluster.local:8181"
            - name: INFLUXDB3_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: admin-token
            - name: TRIGGER_NAME
              value: "downsample_1h"
            # Source database the plugin queries from (aggregates are written
            # cross-database to `homelab_1h` by the plugin itself).
            - name: TRIGGER_DATABASE
              value: "homelab"
            # Hourly at :05 — the 5-minute offset mirrors the legacy Flux task
            # and gives late writes from the previous hour time to flush.
            - name: TRIGGER_SPEC
              value: "cron:5 * * * *"
            - name: PLUGIN_PATH
              value: "/plugins/downsample_1h.py"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: plugins
              mountPath: /plugins
      volumes:
        - name: scripts
          configMap:
            name: influxdb-triggers-init-script
            defaultMode: 0555
        - name: plugins
          configMap:
            name: influxdb-plugins
            defaultMode: 0444
