apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: influxdb

resources:
  - ./namespace.yaml
  - ./initialize-influxdb-databases-job.yaml
  - ./sealed-secret.yaml

helmCharts:
  - name: influxdb3-enterprise
    repo: https://helm.influxdata.com
    releaseName: influxdb3
    version: 0.2.0
    valuesFile: values.yaml
    namespace: influxdb

# Chart hard-codes the S3 secret keys as access-key-id / secret-access-key,
# but the shared rustfs-admin-credentials uses RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY.
# Remap the chart-generated secretKeyRef keys to point to the existing RustFS keys.
replacements:
  - sourceValue: RUSTFS_ACCESS_KEY
    targets:
      - select:
          kind: StatefulSet
        fieldPaths:
          - spec.template.spec.containers.[name=influxdb3].env.[name=AWS_ACCESS_KEY_ID].valueFrom.secretKeyRef.key
  - sourceValue: RUSTFS_SECRET_KEY
    targets:
      - select:
          kind: StatefulSet
        fieldPaths:
          - spec.template.spec.containers.[name=influxdb3].env.[name=AWS_SECRET_ACCESS_KEY].valueFrom.secretKeyRef.key

patches:
  # Chart emits INFLUXDB3_ENTERPRISE_LICENSE_FILE (env index 1) whenever
  # license.existingSecret is set, but we only provide license-email (at-home flow).
  # InfluxDB prefers the file over the email and fails.
  - target:
      kind: StatefulSet
      name: influxdb3-ingester
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/env/1/name
        value: INFLUXDB3_ENTERPRISE_LICENSE_FILE
      - op: remove
        path: /spec/template/spec/containers/0/env/1

  # Strip --mode=ingest so the single node starts in combined mode
  # (ingest + query + compact). Home license allows only one node.
  - target:
      kind: StatefulSet
      name: influxdb3-ingester
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/command/2
        value: "exec influxdb3 \\\n  serve \\\n  --mode=ingest \\\n  --node-id=$(hostname)\n"
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: "exec influxdb3 \\\n  serve \\\n  --node-id=$(hostname)\n"

configMapGenerator:
  - name: influxdb-database-init-script
    options:
      disableNameSuffixHash: true
    files:
      - scripts/initialize-influxdb-databases.sh

labels:
  - includeSelectors: false
    pairs:
      homelab.app: influxdb

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
