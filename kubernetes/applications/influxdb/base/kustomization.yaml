apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: influxdb
resources:
  - ./namespace.yaml
  - ./persistentvolume.yaml
  - ./deployment.yaml
  - ./service.yaml
  - ./initialize-influxdb-databases-job.yaml
  - ./sealed-secret.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml

configMapGenerator:
  - name: influxdb-explorer-config
    options:
      disableNameSuffixHash: true
    files:
      - config.json=config/explorer.json
  - name: influxdb-database-init-script
    options:
      disableNameSuffixHash: true
    files:
      - scripts/initialize-influxdb-databases.sh

labels:
  - includeSelectors: false
    pairs:
      homelab.app: influxdb

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
