# Persistent storage for InfluxDB 3 Core data (Parquet files, WAL).
# Uses longhorn-backup for daily S3 snapshots of historical metrics.
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: influxdb-data
  namespace: influxdb

spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: PLACEHOLDER

---
# SQLite session database for InfluxDB 3 Explorer UI.
# Session-only data, no backup needed.
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: influxdb-explorer-db
  namespace: influxdb

spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 100Mi
