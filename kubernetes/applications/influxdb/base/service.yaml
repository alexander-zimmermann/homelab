# Cluster-internal API service — consumed by Telegraf, Explorer UI, and Grafana datasource.
apiVersion: v1
kind: Service

metadata:
  name: influxdb
  namespace: influxdb

spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: influxdb
  ports:
    - name: http
      port: 8181
      targetPort: http
      protocol: TCP

---
# UI service — fronted by Traefik IngressRoute for external access.
apiVersion: v1
kind: Service

metadata:
  name: influxdb-explorer
  namespace: influxdb

spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: influxdb-explorer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
