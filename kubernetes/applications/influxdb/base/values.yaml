# Stable resource name for all rendered objects
fullnameOverride: influxdb3

cluster:
  id: homelab-cluster

# At-Home license (free, 2 cores, 1 node).
license:
  type: home
  # The chart only emits INFLUXDB3_ENTERPRISE_LICENSE_EMAIL when `email` is truthy,
  # so a placeholder is set here — the actual value is read from `existingSecret`
  email: configured-via-existingsecret
  existingSecret: influxdb-credentials

# Object storage: in-cluster RustFS (S3-compatible)
# Credentials synced from rustfs namespace via Kyverno ClusterPolicy.
objectStorage:
  type: s3
  bucket: influxdb3
  s3:
    endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
    region: us-east-1
    allowHttp: true
    existingSecret: rustfs-admin-credentials

security:
  auth:
    # Preconfigured admin token file (mounted via extraVolumes below)
    adminTokenFile: /etc/influxdb3/tokens/admin-token.json

# Workaround: chart sets LICENSE_FILE env when existingSecret is used, but we only
# provide license-email — InfluxDB prefers file over email and fails. Unset it.
extraEnv:
  - name: INFLUXDB3_UNSET_VARS
    value: INFLUXDB3_ENTERPRISE_LICENSE_FILE

# Single replica per component (at-home license: 2 cores total across cluster).
ingester:
  replicas: 1
  persistence:
    storageClass: longhorn
    size: PLACEHOLDER

querier:
  replicas: 1

# Python processing engine not needed for homelab.
processingEngine:
  enabled: false

# No external ingress — InfluxDB is reached cluster-internally (Telegraf, Grafana, kubectl exec).
ingress:
  enabled: false

serviceMonitor:
  enabled: true
  # Prometheus Operator label (Opt-In)
  additionalLabels:
    release: prometheus

# Mount the admin token JSON file referenced by security.auth.adminTokenFile
extraVolumes:
  - name: admin-token
    secret:
      secretName: influxdb-credentials
      items:
        - key: admin-token.json
          path: admin-token.json
      defaultMode: 0400
extraVolumeMounts:
  - name: admin-token
    mountPath: /etc/influxdb3/tokens
    readOnly: true
