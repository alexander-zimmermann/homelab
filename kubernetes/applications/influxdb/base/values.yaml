# Stable resource name for all rendered objects
fullnameOverride: influxdb3

cluster:
  id: homelab-cluster

# At-Home license (free, 2 cores, 1 node).
license:
  type: home
  # The chart only emits INFLUXDB3_ENTERPRISE_LICENSE_EMAIL when `email` is truthy,
  # so a placeholder is set here — the actual value is read from `existingSecret`
  email: configured-via-existingsecret
  existingSecret: influxdb-credentials

# Object storage: in-cluster RustFS (S3-compatible)
# Credentials synced from rustfs namespace via Kyverno ClusterPolicy.
objectStorage:
  type: s3
  bucket: influxdb3
  s3:
    endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
    region: us-east-1
    allowHttp: true
    existingSecret: rustfs-admin-credentials

security:
  auth:
    # Allow Prometheus to scrape /metrics and kubelet to probe /health without a token.
    disableAuthz: ["health", "metrics"]

# Chart declares security.auth.adminTokenFile but templates don't render it.
# Inject the env var via extraEnv until the chart implements it.
extraEnv:
  - name: INFLUXDB3_ADMIN_TOKEN_FILE
    value: /etc/influxdb3/tokens/admin-token.json

# At-Home license allows only ONE node. Run the ingester as the sole component —
# Kustomize patches strip --mode=ingest so it starts in combined mode
# (ingest + query + compact in a single process).
ingester:
  replicas: 1
  persistence:
    storageClass: longhorn
    size: PLACEHOLDER
  # Backfill tuning — sized for the one-off 2022..2026 history import into
  # `homelab_1h`. Default (70% snapshot threshold, 600 WAL files/snapshot) let
  # the snapshot sort/dedupe step OOM the pod under bulk-write load. Revert to
  # chart defaults once the backfill is complete; steady-state ingest should
  # not run with 30% threshold.
  memory:
    forceSnapshotMemThreshold: "30%"
    execMemPoolBytes: "40%"
  wal:
    snapshotSize: 100
    replayFailOnError: false

# Gen1 compactor only looks 24h into the past by default — historical backfill
# falls outside that window, leaving thousands of tiny Parquet files
# uncompacted and blowing up memory. Cover the full 4-year range so backfilled
# partitions compact normally.
dataLifecycle:
  gen1LookbackDuration: "1460d"

# Disable separate querier/compactor — the single combined node handles all roles.
querier:
  enabled: false

compactor:
  enabled: false

processingEngine:
  enabled: false

# No external ingress — InfluxDB is reached cluster-internally (Telegraf, Grafana, kubectl exec).
ingress:
  enabled: false

serviceMonitor:
  enabled: true
  # Prometheus Operator label (Opt-In)
  additionalLabels:
    release: prometheus

# Mount the admin token JSON file referenced by security.auth.adminTokenFile and the Processing
# Engine plugin directory
extraVolumes:
  - name: admin-token
    secret:
      secretName: influxdb-credentials
      items:
        - key: admin-token.json
          path: admin-token.json
      defaultMode: 0400
  - name: plugins
    configMap:
      name: influxdb-plugins
      defaultMode: 0444
extraVolumeMounts:
  - name: admin-token
    mountPath: /etc/influxdb3/tokens
    readOnly: true
  - name: plugins
    mountPath: /plugins
    readOnly: true
