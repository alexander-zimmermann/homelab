apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Ingester WAL PVC size
  - sourceValue: 512Mi
    targets:
      - select:
          kind: StatefulSet
          name: influxdb3-ingester
        fieldPaths:
          - spec.volumeClaimTemplates.0.spec.resources.requests.storage

patches:
  # Ingester: writes + WAL flush to object store
  - target:
      kind: StatefulSet
      name: influxdb3-ingester
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: influxdb3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

  # Querier: SQL/InfluxQL over Parquet files
  - target:
      kind: StatefulSet
      name: influxdb3-querier
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: influxdb3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

  # Compactor: Parquet optimisation (CPU-bound, intermittent)
  - target:
      kind: StatefulSet
      name: influxdb3-compactor
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: influxdb3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
