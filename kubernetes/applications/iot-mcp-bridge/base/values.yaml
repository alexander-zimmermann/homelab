# Override chart's default resource naming (`application`)
applicationName: iot-mcp-bridge

deployment:
  enabled: true
  image:
    repository: ghcr.io/alexander-zimmermann/iot-mcp-bridge
    tag: 0.2.0
    pullPolicy: IfNotPresent

  replicas: 1
  strategy:
    type: RollingUpdate

  env:
    MCP_DB_HOST:
      value: timescaledb-db-rw.timescaledb.svc.cluster.local
    MCP_DB_PORT:
      value: "5432"
    MCP_DB_NAME:
      value: homelab
    # DB credentials mounted as files from the synced Secret (Kyverno clones from `timescaledb` namespace)
    MCP_DB_USERNAME_FILE:
      value: /etc/iot-mcp-bridge/db_username
    MCP_DB_PASSWORD_FILE:
      value: /etc/iot-mcp-bridge/db_password
    MCP_AUTH_ENABLED:
      value: "true"
    MCP_AUTH_JWKS_URL:
      value: PLACEHOLDER_AUTH_JWKS_URL
    MCP_AUTH_ISSUER:
      value: PLACEHOLDER_AUTH_ISSUER
    MCP_AUTH_AUDIENCE:
      value: iot-mcp-bridge
    MCP_AUTH_RESOURCE_URL:
      value: PLACEHOLDER_AUTH_RESOURCE_URL
    MCP_LOG_FORMAT:
      value: json
    TZ:
      value: Europe/Berlin

  volumes:
    db-username:
      secret:
        secretName: timescaledb-db-iot-mcp-bridge-ro-secret
        items:
          - key: username
            path: username
    db-password:
      secret:
        secretName: timescaledb-db-iot-mcp-bridge-ro-secret
        items:
          - key: password
            path: password

  volumeMounts:
    db-username:
      mountPath: /etc/iot-mcp-bridge/db_username
      subPath: username
      readOnly: true
    db-password:
      mountPath: /etc/iot-mcp-bridge/db_password
      subPath: password
      readOnly: true

  ports:
    - containerPort: 8080
      name: mcp
      protocol: TCP

  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: mcp
    initialDelaySeconds: 10
    periodSeconds: 30

  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: mcp
    initialDelaySeconds: 5
    periodSeconds: 10

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  securityContext:
    fsGroup: 1000

service:
  enabled: true
  type: ClusterIP
  ports:
    - port: 8080
      name: mcp
      protocol: TCP
      targetPort: mcp
