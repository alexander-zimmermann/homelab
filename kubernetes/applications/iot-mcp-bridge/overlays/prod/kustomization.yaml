apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject prod hostname into Certificate dnsNames and IngressRoute Host(...) match.
  - sourceValue: mcp.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: iot-mcp-bridge-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: iot-mcp-bridge
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1

  # OIDC env vars — Authentik issuer/JWKS at auth.zimmermann.sh, MCP at mcp.zimmermann.sh
  - sourceValue: https://auth.zimmermann.sh/application/o/iot-mcp-bridge/jwks/
    targets:
      - select:
          kind: Deployment
          name: iot-mcp-bridge
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=MCP_AUTH_JWKS_URL].value

  - sourceValue: https://auth.zimmermann.sh/application/o/iot-mcp-bridge/
    targets:
      - select:
          kind: Deployment
          name: iot-mcp-bridge
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=MCP_AUTH_ISSUER].value

  - sourceValue: https://mcp.zimmermann.sh/mcp
    targets:
      - select:
          kind: Deployment
          name: iot-mcp-bridge
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=MCP_AUTH_RESOURCE_URL].value
