# kromgo metric catalog — each entry becomes a `GET /<name>` endpoint.
metrics:
  # Versions
  - name: talos_version
    # Parse `os_image` ("Talos (vX.Y.Z)"); node_exporter's node_os_info is not deployed on Talos.
    query: label_replace(max(kube_node_info) by (os_image), "version_id", "$1", "os_image", "Talos \\(v(.+)\\)")
    label: version_id
    title: Talos

  - name: kubernetes_version
    query: label_replace(min(kubernetes_build_info) by (git_version), "git_version", "$1", "git_version", "v(.+)")
    label: git_version
    title: Kubernetes

  # Cluster size
  - name: cluster_node_count
    query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
    colors:
      - { color: green, min: 0, max: 9999 }
    title: Nodes

  - name: cluster_pod_count
    query: sum(kube_pod_status_phase{phase="Running"})
    colors:
      - { color: green, min: 0, max: 9999 }
    title: Pods

  # Resource usage
  - name: cluster_cpu_usage
    # cAdvisor rate over kube-state-metrics capacity; `instance:node_cpu_utilisation:rate5m`
    # recording rule is absent because node_exporter is not deployed on Talos.
    query: round(sum(rate(node_cpu_usage_seconds_total[5m])) / sum(kube_node_status_capacity{resource="cpu"}) * 100, 0.1)
    suffix: "%"
    colors:
      - { color: green, min: 0, max: 35 }
      - { color: orange, min: 36, max: 75 }
      - { color: red, min: 76, max: 9999 }
    title: CPU

  - name: cluster_memory_usage
    # working_set_bytes over capacity; node_memory_MemTotal_bytes is unavailable without node_exporter.
    query: round(sum(node_memory_working_set_bytes) / sum(kube_node_status_capacity{resource="memory"}) * 100, 0.1)
    suffix: "%"
    colors:
      - { color: green, min: 0, max: 35 }
      - { color: orange, min: 36, max: 75 }
      - { color: red, min: 76, max: 9999 }
    title: Memory

  # Lifetime
  - name: cluster_age_days
    query: round((time() - min(kube_node_created)) / 86400)
    suffix: d
    colors:
      - { color: green, min: 0, max: 180 }
      - { color: orange, min: 181, max: 360 }
      - { color: red, min: 361, max: 9999 }
    title: Age

  - name: cluster_uptime_days
    # Kubelet start time as a proxy; on Talos a kubelet restart effectively means a node reboot.
    query: round((time() - min(process_start_time_seconds{job=~".*kubelet.*"})) / 86400)
    suffix: d
    colors:
      - { color: green, min: 0, max: 180 }
      - { color: orange, min: 181, max: 360 }
      - { color: red, min: 361, max: 9999 }
    title: Uptime

  # Health
  - name: cluster_alert_count
    # Subtract 1 to ignore the always-firing Watchdog alert
    query: alertmanager_alerts{state="active"} - 1
    colors:
      - { color: green, min: 0, max: 0 }
      - { color: red, min: 1, max: 9999 }
    title: Alerts
