apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kromgo
resources:
  - ./namespace.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml

helmCharts:
  - name: application
    repo: https://stakater.github.io/stakater-charts
    releaseName: kromgo
    version: 6.16.1
    valuesFile: values.yaml
    namespace: kromgo
    apiVersions:
      - monitoring.coreos.com/v1

configMapGenerator:
  - name: kromgo-config
    files:
      - config.yaml=config/kromgo.yaml

labels:
  - includeSelectors: false
    pairs:
      homelab.app: kromgo

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
