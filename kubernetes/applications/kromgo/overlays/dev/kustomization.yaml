apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate and IngressRoute
  - sourceValue: kromgo.zimmermann.phd
    targets:
      - select:
          kind: Certificate
          name: kromgo-tls
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: kromgo
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
