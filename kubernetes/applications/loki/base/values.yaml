# Loki SingleBinary deployment
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    # Automatic StatefulSet recreation for PVC expansion
    enableStatefulSetRecreationForSizeChange: true
    # Persistent Volume Claim
    storageClass: longhorn
    size: PLACEHOLDER

gateway:
  # Expose Loki Gateway service via Cilium/BGP-announced LoadBalancer
  service:
    type: LoadBalancer
    labels:
      bgp.cilium.io/ip-pool: default
      bgp.cilium.io/advertise-service: default

# Scalability settings for distributed components
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

loki:
  # Disable internal authentication
  auth_enabled: false

  commonConfig:
    # Ingester replication factor
    replication_factor: 1

  ingester:
    # Max time a chunk lives in memory before flushing
    max_chunk_age: 1h
    # Flush chunk after this idle period
    chunk_idle_period: 30m
    # Target chunk size in bytes (1MB)
    chunk_target_size: 1048576
    # Compression algorithm
    chunk_encoding: snappy

  querier:
    # Max concurrent queries per querier
    max_concurrent: 2

  limits_config:
    # Global log retention period
    retention_period: 336h
    # Maximum lookback period for log queries
    max_query_lookback: 336h
    # Rejection threshold for older log samples
    reject_old_samples: true
    reject_old_samples_max_age: 336h

    # Max sub-queries per request (split by time)
    max_query_parallelism: 4
    # Max parallelism for TSDB index queries
    tsdb_max_query_parallelism: 32
    # Limit log lines returned per query to prevent OOM
    max_entries_limit_per_query: 5000
    # Hard timeout for queries
    query_timeout: 30s

    # Ingestion rate limit (MB/s per tenant; single tenant = global cap)
    ingestion_rate_mb: 2
    ingestion_burst_size_mb: 4

    # Max active log streams per tenant (prevents cardinality explosion)
    max_streams_per_user: 1000

    # Per-stream rate limit (prevents a single noisy stream from flooding storage)
    per_stream_rate_limit: 512KB
    per_stream_rate_limit_burst: 1MB

  storage:
    type: filesystem

  schemaConfig:
    # Schema configuration for storage
    configs:
      - from: "2024-04-01"
        # Store for index: TSDB is the modern, efficient format for Loki
        store: tsdb
        # Store for chunks: filesystem (local disk via PVC)
        object_store: filesystem
        # Schema version: v13 is recommended for TSDB
        schema: v13
        index:
          prefix: index_
          period: 24h

  compactor:
    # Compactor-based retention configuration
    retention_enabled: true
    delete_request_store: filesystem

# Chunks cache resources are configured in overlays
chunksCache:
  allocatedMemory: 256

# Results cache resources are configured in overlays
resultsCache:
  allocatedMemory: 256

monitoring:
  # Prometheus Monitoring
  serviceMonitor:
    enabled: true
    # Prometheus Operator label (Opt-In)
    labels:
      release: prometheus
