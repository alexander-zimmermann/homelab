apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject storage size configuration
  - sourceValue: 500Mi
    targets:
      - select:
          kind: StatefulSet
          name: loki
        fieldPaths:
          - spec.volumeClaimTemplates.0.spec.resources.requests.storage

patches:
  # Loki Gateway (Deployment)
  - target:
      kind: Deployment
      name: loki-gateway
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: nginx
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

  # Loki SingleBinary (StatefulSet)
  - target:
      kind: StatefulSet
      name: loki
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: loki
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: GOMEMLIMIT
            value: "483183820"

      - op: test
        path: /spec/template/spec/containers/1/name
        value: loki-sc-rules
      - op: add
        path: /spec/template/spec/containers/1/resources
        value:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      - op: add
        path: /spec/template/spec/containers/1/env/-
        value:
          name: GOMEMLIMIT
          value: "120795955"

  # Loki Chunks Cache (StatefulSet)
  - target:
      kind: StatefulSet
      name: loki-chunks-cache
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: memcached
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 128Mi

      - op: test
        path: /spec/template/spec/containers/1/name
        value: exporter
      - op: add
        path: /spec/template/spec/containers/1/resources
        value:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      - op: add
        path: /spec/template/spec/containers/1/env
        value:
          - name: GOMEMLIMIT
            value: "60397977"

  # Loki Results Cache (StatefulSet)
  - target:
      kind: StatefulSet
      name: loki-results-cache
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: memcached
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 128Mi

      - op: test
        path: /spec/template/spec/containers/1/name
        value: exporter
      - op: add
        path: /spec/template/spec/containers/1/resources
        value:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      - op: add
        path: /spec/template/spec/containers/1/env
        value:
          - name: GOMEMLIMIT
            value: "60397977"

  # Loki Canary (DaemonSet)
  - target:
      kind: DaemonSet
      name: loki-canary
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: loki-canary
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GOMEMLIMIT
          value: "60397977"
