apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nats
resources:
  - ./namespace.yaml
  - ./sealed-secret.yaml

helmCharts:
  - name: nack
    repo: https://nats-io.github.io/k8s/helm/charts/
    releaseName: nats-operator
    version: 0.33.2
    valuesFile: values.yaml
    namespace: nats
    includeCRDs: true

labels:
  - includeSelectors: false
    pairs:
      homelab.app: nats-operator

commonAnnotations:
  argocd.argoproj.io/sync-wave: "9"
