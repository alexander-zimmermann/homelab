# Stable resource name for all rendered objects
fullnameOverride: nats

config:
  jetstream:
    enabled: true
    fileStore:
      pvc:
        enabled: true
        size: PLACEHOLDER
        storageClassName: longhorn

  # MQTT gateway for IoT device compatibility
  mqtt:
    enabled: true

  # Include authentication config from mounted secret
  merge:
    $include: secrets/auth.conf

# Mount auth credentials secret (patch to append, not replace existing volumes)
podTemplate:
  patch:
    - op: add
      path: /spec/volumes/-
      value:
        name: nats-secret
        secret:
          secretName: nats-auth-config

container:
  patch:
    - op: add
      path: /volumeMounts/-
      value:
        name: nats-secret
        mountPath: /etc/nats-config/secrets
        readOnly: true

# Disable utility/debug pod
natsBox:
  enabled: false

# Expose NATS and MQTT via Cilium/BGP LoadBalancer
service:
  merge:
    spec:
      type: LoadBalancer
    metadata:
      annotations:
        coredns.io/hostname: PLACEHOLDER
      labels:
        bgp.cilium.io/ip-pool: default
        bgp.cilium.io/advertise-service: default

# Prometheus metrics exporter sidecar
promExporter:
  enabled: true
  podMonitor:
    enabled: true
    merge:
      metadata:
        labels:
          # Prometheus Operator label (Opt-In)
          release: prometheus
