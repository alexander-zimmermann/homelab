apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-red

spec:
  selector:
    # Must match `.spec.template.metadata.labels`.
    matchLabels:
      app.kubernetes.io/name: node-red
  # Single instance; Node-RED is not designed for horizontal scaling.
  replicas: 1
  strategy:
    # Node-RED uses local state on a PVC; avoid concurrent writers.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-red
    spec:
      # No API access required.
      automountServiceAccountToken: false
      securityContext:
        # Node-RED runs as user 'node' (uid 1000); fsGroup ensures the PVC is writable.
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        # Persistent data directory (flows, credentials, settings, node_modules).
        - name: node-red-data
          persistentVolumeClaim:
            claimName: node-red-data
      containers:
        - name: node-red
          image: docker.io/nodered/node-red:4.1.8
          imagePullPolicy: IfNotPresent
          env:
            # Keep logs/timestamps consistent with local timezone.
            - name: TZ
              value: "Europe/Berlin"
          resources:
            # Ensure Burstable QoS (no BestEffort) and prevent runaway usage.
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http
              containerPort: 1880
          readinessProbe:
            # Consider Node-RED ready when the UI responds.
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5
          livenessProbe:
            # Restart if Node-RED stops responding.
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          volumeMounts:
            # Node-RED stores flows, credentials and settings under /data.
            - name: node-red-data
              mountPath: /data
