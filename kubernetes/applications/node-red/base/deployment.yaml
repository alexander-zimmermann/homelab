apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-red

spec:
  selector:
    # Must match `.spec.template.metadata.labels`.
    matchLabels:
      app.kubernetes.io/name: node-red
  # Single instance; Node-RED is not designed for horizontal scaling.
  replicas: 1
  strategy:
    # Node-RED uses local state on a PVC; avoid concurrent writers.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-red
    spec:
      # No API access required.
      automountServiceAccountToken: false
      securityContext:
        # Node-RED runs as user 'node' (uid 1000); fsGroup ensures the PVC is writable.
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      volumes:
        # Persistent data directory (flows, credentials, node_modules, etc.).
        - name: node-red-data
          persistentVolumeClaim:
            claimName: node-red-data
        # settings.js is managed via ConfigMap; mounted at a separate path.
        - name: node-red-settings
          configMap:
            name: node-red-settings
      initContainers:
        # Installs passport-openidconnect into /data/node_modules for OIDC adminAuth.
        # NODE_PATH on the main container makes this available to require() in settings.js.
        - name: install-oidc-deps
          image: docker.io/library/node:lts-alpine
          command: ["sh", "-c", "npm install --prefix /data --no-save passport-openidconnect"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: node-red-data
              mountPath: /data
      containers:
        - name: node-red
          image: docker.io/nodered/node-red:4.1.8
          imagePullPolicy: IfNotPresent
          args:
            - --settings
            - /config/settings.js
          env:
            # Keep logs/timestamps consistent with local timezone.
            - name: TZ
              value: "Europe/Berlin"
            # Credential encryption key for flows_cred.json (sourced from SealedSecret).
            - name: NODE_RED_CREDENTIAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: node-red-credentials
                  key: credential-secret
            # OIDC: makes /data/node_modules available to require() in settings.js.
            - name: NODE_PATH
              value: /data/node_modules
            # OIDC: Authentik base URL — injected per environment via overlay replacements.
            - name: AUTHENTIK_HOST
              value: PLACEHOLDER
            # OIDC: callback URL after authentication — injected per environment via overlay replacements.
            - name: NODE_RED_CALLBACK_URL
              value: PLACEHOLDER
            # OIDC: client secret synced from authentik namespace by Kyverno.
            - name: NODE_RED_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: node-red-oidc-secret
                  key: NODE_RED_OIDC_CLIENT_SECRET
          resources:
            # Ensure Burstable QoS (no BestEffort) and prevent runaway usage.
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http
              containerPort: 1880
          readinessProbe:
            # Consider Node-RED ready when the UI responds.
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5
          livenessProbe:
            # Restart if Node-RED stops responding.
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          volumeMounts:
            # Node-RED stores flows, credentials and node_modules under /data.
            - name: node-red-data
              mountPath: /data
            # ConfigMap settings.js mounted at /config (no overlap with PVC).
            - name: node-red-settings
              mountPath: /config/settings.js
              subPath: settings.js
