apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: node-red
resources:
  - ./namespace.yaml
  - ./persistentvolume.yaml
  - ./deployment.yaml
  - ./service.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml

labels:
  - includeSelectors: false
    pairs:
      homelab.app: node-red

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
