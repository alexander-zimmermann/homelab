apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: prometheus
  namespace: prometheus
  annotations:
    # ExternalDNS configuration for Cloudflare
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    kubernetes.io/ingress.class: traefik
    # Homepage Service Discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Observability"
    gethomepage.dev/name: "Prometheus"
    gethomepage.dev/icon: "prometheus.png"
    gethomepage.dev/weight: "2"
    gethomepage.dev/href: "https://PLACEHOLDER"
    gethomepage.dev/widget.type: "prometheus"
    gethomepage.dev/widget.url: "http://prometheus-operated.prometheus.svc.cluster.local:9090"
    # Gatus dead-man-switch: queries the Prometheus API for the Watchdog alert;
    # fails (and pages Pushover) if Prometheus is unreachable or the rule stops firing.
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      name: Watchdog
      group: Observability
      url: http://prometheus-prometheus.prometheus.svc.cluster.local:9090/api/v1/query?query=ALERTS%7Balertname%3D%22Watchdog%22%2Calertstate%3D%22firing%22%7D
      interval: 1m
      conditions:
        - "[STATUS] == 200"
        - "[BODY].data.result[0].value[1] == 1"
      alerts:
        - type: pushover

spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`PLACEHOLDER`)
      priority: 10
      middlewares:
        - name: chain-mfa-auth
          namespace: ingress-controller
      services:
        - kind: Service
          name: prometheus-prometheus
          port: 9090
  tls:
    secretName: prometheus-tls-cert

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: prometheus
  annotations:
    # ExternalDNS configuration for Cloudflare
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    kubernetes.io/ingress.class: traefik
    # Homepage annotations
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Observability"
    gethomepage.dev/name: "Alertmanager"
    gethomepage.dev/icon: "alertmanager.png"
    gethomepage.dev/weight: "3"
    gethomepage.dev/href: "https://PLACEHOLDER"

spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`PLACEHOLDER`)
      priority: 10
      middlewares:
        - name: chain-mfa-auth
          namespace: ingress-controller
      services:
        - kind: Service
          name: prometheus-alertmanager
          port: 9093
  tls:
    secretName: alertmanager-tls-cert
