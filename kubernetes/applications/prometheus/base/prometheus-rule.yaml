apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: homelab-rules
  labels:
    release: prometheus

spec:
  groups:
    - name: instance-down
      rules:
        - alert: InstanceDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Instance {{ $labels.instance }} down"
            description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

    - name: traefik-alerts
      rules:
        - alert: HighHttp4xxErrorRateService
          expr: 'sum(rate(traefik_service_requests_total{code=~"4.*"}[3m])) by (service) / sum(rate(traefik_service_requests_total[3m])) by (service) * 100 > 10'
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Traefik high HTTP 4xx error rate ({{ $labels.service }})"
            description: "Traefik service 4xx error rate is above 10%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

        - alert: HighHttp5xxErrorRateService
          expr: 'sum(rate(traefik_service_requests_total{code=~"5.*"}[3m])) by (service) / sum(rate(traefik_service_requests_total[3m])) by (service) * 100 > 5'
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Traefik high HTTP 5xx error rate ({{ $labels.service }})"
            description: "Traefik service 5xx error rate is above 5%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

    - name: gatus-alerts
      rules:
        - alert: GatusDown
          expr: absent(up{job="gatus"}) == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Gatus is not being scraped"
            description: "Gatus has not been scraped by Prometheus for more than 5 minutes — external reachability monitoring is offline."

    - name: rustfs-alerts
      rules:
        - alert: RustfsDriveOffline
          expr: max by (endpoint) (rustfs_drive_runtime_state{state="offline"}) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "RustFS drive {{ $labels.endpoint }} marked offline"
            description: "Health-state machine flipped {{ $labels.endpoint }} to offline — every S3 op will fail (rustfs#2601 class regression)."

        - alert: RustfsDriveStateFlapping
          expr: sum(increase(rustfs_drive_state_transition_total[15m])) by (endpoint) > 4
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RustFS drive {{ $labels.endpoint }} flapping"
            description: "More than 4 health-state transitions in 15m — likely too-aggressive timeouts or NFS-side latency."

        - alert: RustfsDriveOpTimeout
          expr: sum(increase(rustfs_drive_op_timeout_total[10m])) by (op) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RustFS drive op {{ $labels.op }} timing out"
            description: "Drive operation {{ $labels.op }} hit the per-op timeout — consider raising the matching RUSTFS_DRIVE_*_TIMEOUT_SECS env var."
