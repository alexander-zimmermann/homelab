apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: homelab-rules
  labels:
    release: prometheus

spec:
  groups:
    - name: instance-down
      rules:
        - alert: InstanceDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Instance {{ $labels.instance }} down"
            description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

    - name: traefik-alerts
      rules:
        - alert: HighHttp4xxErrorRateService
          expr: 'sum(rate(traefik_service_requests_total{code=~"4.*"}[3m])) by (service) / sum(rate(traefik_service_requests_total[3m])) by (service) * 100 > 10'
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Traefik high HTTP 4xx error rate ({{ $labels.service }})"
            description: "Traefik service 4xx error rate is above 10%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

        - alert: HighHttp5xxErrorRateService
          expr: 'sum(rate(traefik_service_requests_total{code=~"5.*"}[3m])) by (service) / sum(rate(traefik_service_requests_total[3m])) by (service) * 100 > 5'
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Traefik high HTTP 5xx error rate ({{ $labels.service }})"
            description: "Traefik service 5xx error rate is above 5%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
