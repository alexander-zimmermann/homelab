# Use a stable, short name for all rendered resources
fullnameOverride: prometheus

# Reduce duplicate prefixes for objects created by the Prometheus Operator
cleanPrometheusOperatorObjectNames: true

# Grafana runs as a separate app
grafana:
  enabled: false

alertmanager:
  # Alertmanager configuration with Pushover and Node-RED integrations
  config:
    global:
      resolve_timeout: 5m
      # Internal smtprelay (no auth, accepts mail from cluster CIDR)
      smtp_smarthost: smtprelay.smtprelay.svc.cluster.local:25
      # iCloud caps custom-domain aliases at 3, so all in-cluster services share the `admin` alias
      smtp_from: admin@zimmermann.sh
      smtp_require_tls: false
    route:
      # Group by job to avoid alert storms when multiple alerts fire together
      group_by: ["alertname", "job"]
      group_wait: 30s
      group_interval: 1m
      repeat_interval: 6h
      receiver: "endpoints"
      routes:
        # Watchdog heartbeat: routine signal, route to email only (no Pushover noise)
        - matchers:
            - alertname = "Watchdog"
          receiver: "watchdog-email"
          repeat_interval: 12h
    receivers:
      - name: "endpoints"
        # Pushover integration for mobile notifications
        pushover_configs:
          - token_file: /etc/alertmanager/secrets/alertmanager-pushover-tokens/token
            user_key_file: /etc/alertmanager/secrets/alertmanager-pushover-tokens/user_key
            sound: siren
        # Node-RED endpoint for container status events
        webhook_configs:
          - url: "http://node-red.zimmermann.eu.com:1880/container-status"
            send_resolved: true
      - name: "watchdog-email"
        email_configs:
          - to: alexander@zimmermann.eu.com
            send_resolved: true

  alertmanagerSpec:
    # Mount the Pushover secret so token_file / user_key_file can reference it
    secrets:
      - alertmanager-pushover-tokens
    # Persist Alertmanager state (silences, notification log)
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: PLACEHOLDER

prometheus:
  # Expose Prometheus service via Cilium/BGP-announced LoadBalancer
  service:
    type: LoadBalancer
    labels:
      bgp.cilium.io/ip-pool: default
      bgp.cilium.io/advertise-service: default

  prometheusSpec:
    # Required for remote_write receiver (e.g. for agent-based ingestion)
    enableRemoteWriteReceiver: true

    # Opt-In Model: Only scrape ServiceMonitors/PodMonitors with 'release: prometheus'
    serviceMonitorSelector:
      matchLabels:
        release: prometheus
    podMonitorSelector:
      matchLabels:
        release: prometheus

    # Reduces TSDB disk usage by approx. 30-40% with minimal CPU overhead
    walCompression: true

    # Stability guards to prevent OOM kills from heavy queries or dashboards
    additionalArgs:
      - name: query.max-concurrency
        value: "5"
      - name: query.timeout
        value: "30s"
      - name: query.max-samples
        value: "5000000"

    # Enable Experimental Features
    enableFeatures:
      # Enable Memory snapshot on shutdown for faster restarts
      - memory-snapshot-on-shutdown

    # Administrative maintenance API
    enableAdminAPI: true

    # Enable lifecycle API for dynamic reloads
    enableLifecycle: true

    # Retention data configuration
    retention: PLACEHOLDER
    retentionSize: PLACEHOLDER

    # Persist TSDB data
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: PLACEHOLDER

    # Alertmanager configuration
    alerting:
      alertmanagers:
        - apiVersion: v2
          name: prometheus-alertmanager
          namespace: prometheus
          port: web

# Component scraping the kube api server
kubeApiServer:
  serviceMonitor:
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (apiserver_request_total|apiserver_request_duration_seconds_sum|apiserver_request_duration_seconds_count|apiserver_current_inflight_requests|apiserver_cache_.*|apiserver_flowcontrol_.*|apiserver_storage_.*|process_start_time_seconds)

# Component scraping the kubelet and kubelet-hosted cAdvisor
kubelet:
  serviceMonitor:
    # cadvisor "Minimal" Profile (Azure-inspired)
    cAdvisorMetricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_fs_usage_bytes|kubernetes_build_info)
    # kubelet "Minimal" Profile
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (kubelet_running_pods|kubelet_running_containers|kubelet_volume_stats_used_bytes|kubelet_node_name|kubernetes_build_info)

# Component scraping coreDNS
coreDns:
  serviceMonitor:
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (coredns_dns_request_duration_seconds_(sum|count)|coredns_dns_requests_total|coredns_forward_request_duration_seconds_(sum|count)|coredns_forward_requests_total|coredns_build_info|coredns_panics_total|coredns_dns_responses_total|coredns_cache_hits_total|coredns_cache_misses_total|coredns_cache_entries|process_resident_memory_bytes|process_cpu_seconds_total|go_goroutines|kubernetes_build_info)

# Component scraping kube proxy (disabled: Cilium runs in kube-proxy replacement mode)
kubeProxy:
  enabled: false

# Component scraping the kube controller manager
kubeControllerManager:
  serviceMonitor:
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (workqueue_adds_total|workqueue_depth|workqueue_queue_duration_seconds_(sum|count)|process_resident_memory_bytes|process_cpu_seconds_total|go_goroutines|kubernetes_build_info)

# Component scraping kube scheduler
kubeScheduler:
  serviceMonitor:
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (scheduler_framework_extension_point_duration_seconds_(sum|count)|scheduler_scheduling_attempt_duration_seconds_(sum|count)|process_resident_memory_bytes|process_cpu_seconds_total|go_goroutines|kubernetes_build_info)

# Component scraping etcd
kubeEtcd:
  serviceMonitor:
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: (etcd_server_has_leader|etcd_server_proposals_committed_total|etcd_server_proposals_applied_total|etcd_disk_wal_fsync_duration_seconds_(sum|count)|etcd_mvcc_db_total_size_in_use_bytes|process_resident_memory_bytes|process_cpu_seconds_total|go_goroutines|kubernetes_build_info)

# Disable exporters/components that are provided via alloy
nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false
