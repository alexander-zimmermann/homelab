apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and Homepage href annotation
  - sourceValue: prometheus.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: prometheus-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: prometheus
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: prometheus
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1
  - sourceValue: alertmanager.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: alertmanager-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: alertmanager
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: alertmanager
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1

  # Inject storage size configuration
  - sourceValue: 10Gi
    targets:
      - select:
          kind: Prometheus
          name: prometheus
        fieldPaths:
          - spec.storage.volumeClaimTemplate.spec.resources.requests.storage
  - sourceValue: 128Mi
    targets:
      - select:
          kind: Alertmanager
          name: prometheus
        fieldPaths:
          - spec.storage.volumeClaimTemplate.spec.resources.requests.storage

  # Inject data retention configuration
  - sourceValue: 14d
    targets:
      - select:
          kind: Prometheus
          name: prometheus
        fieldPaths:
          - spec.retention
  - sourceValue: 9GB
    targets:
      - select:
          kind: Prometheus
          name: prometheus
        fieldPaths:
          - spec.retentionSize

patches:
  # Prometheus Operator: Deploy with standardized resources and GOMEMLIMIT
  - target:
      kind: Deployment
      name: prometheus-operator
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: kube-prometheus-stack
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 10m
            memory: 96Mi
          limits:
            cpu: 200m
            memory: 256Mi
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GOMEMLIMIT
          value: "241172480"

  # Alertmanager: Configure resources and GOMEMLIMIT
  - target:
      kind: Alertmanager
      name: prometheus
    patch: |-
      - op: test
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi
      - op: add
        path: /spec/containers
        value:
          - name: alertmanager
            env:
              - name: GOMEMLIMIT
                value: "241172480"

  # Prometheus instance: Configure resources and TSDB persistence
  - target:
      kind: Prometheus
      name: prometheus
    patch: |-
      - op: test
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      - op: add
        path: /spec/containers
        value:
          - name: prometheus
            env:
              - name: GOMEMLIMIT
                value: "966787072"

  # Prometheus service with static IP and BGP advertisement
  - target:
      kind: Service
      name: prometheus-prometheus
    patch: |-
      - op: test
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /metadata/annotations/io.cilium~1lb-ipam-ips
        value: "192.168.10.27"
