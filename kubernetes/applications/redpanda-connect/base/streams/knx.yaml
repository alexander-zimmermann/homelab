input:
  nats_jetstream:
    urls: ["nats://nats.nats.svc:4222"]
    auth:
      user: redpanda-connect
      password: ${NATS_PASSWORD}
    stream: KNX
    subject: knx.>
    durable: redpanda-connect-knx
    deliver: all
    ack_wait: 30s
    max_ack_pending: 256

pipeline:
  processors:
    - mapping: |
        let evt = this
        let parts = $evt.ga.split("/")
        # DPT format is "<major>.<minor>" (e.g. "1.001", "9.008", "14.058")
        let dpt_major = $evt.dpt.split(".").index(0)
        let value_type = $evt.value.type()

        # DPT-1.x is bool; other DPTs publish numbers. DPT-19 (datetime) and
        # other non-numeric payloads are skipped — raw is lost too, accept that.
        root = if $dpt_major != "1" && $value_type != "number" {
          deleted()
        } else {
          {
            "time":       $evt.ts,
            "ga":         $evt.ga,
            "knx_main":   $parts.index(0).number(),
            "knx_middle": $parts.index(1).number(),
            "knx_sub":    $parts.index(2).number(),
            "knx_name":   $evt.name,
            "dpt":        $evt.dpt,
            "value":      if $dpt_major == "1" {
                            if $evt.value == true { 1.0 } else { 0.0 }
                          } else {
                            $evt.value
                          },
            "raw":        $evt,
          }
        }

output:
  broker:
    pattern: fan_out
    outputs:
      - sql_raw:
          driver: pgx
          max_in_flight: 16
          dsn: postgres://${PGUSER}:${PGPASSWORD}@timescaledb-db-pooler.timescaledb.svc.cluster.local:5432/homelab?sslmode=disable
          init_statement: |
            SET timezone = 'UTC';
          query: |
            INSERT INTO knx (time, ga, knx_main, knx_middle, knx_sub, knx_name, dpt, value, raw)
            VALUES ($1, $2, $3, $4, $5, $6, $7, $8, $9)
            ON CONFLICT (time, ga) DO NOTHING
          args_mapping: |
            root = [
              this.time,
              this.ga,
              this.knx_main,
              this.knx_middle,
              this.knx_sub,
              this.knx_name,
              this.dpt,
              this.value,
              this.raw.string(),
            ]
      - aws_s3:
          bucket: nats-archive
          region: us-east-1
          endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
          force_path_style_urls: true
          credentials:
            id: ${RUSTFS_ACCESS_KEY}
            secret: ${RUSTFS_SECRET_KEY}
          path: knx/${!now().ts_format("2006/01/02/15")}/${!uuid_v4()}.parquet
          batching:
            count: 200
            period: 30s
            processors:
              - mapping: |
                  root = {
                    "time":    this.time,
                    "subject": meta("nats_subject"),
                    "payload": this.raw.format_json(),
                  }
              - parquet_encode:
                  schema:
                    - { name: time,    type: UTF8 }
                    - { name: subject, type: UTF8 }
                    - { name: payload, type: UTF8 }
