# One-shot historical backfill: InfluxDB iox.warp (meters topic) → migration.warp_meter
# Cutover: MIN(time) public.warp_meter = 2026-04-29 19:46:39.376863+00
# Influx data: ~189k rows for warp/meters/0/values
#
# Throughput pattern: per-row INSERT through pgx/PgBouncer caps at ~25 rows/s.
# Output uses output-side batching (1000 rows per call) plus an archive
# processor that turns the batch into one JSON array; sql_raw then uses
# jsonb_array_elements to multi-row INSERT in a single round trip.
input:
  generate:
    count: 1
    interval: 0s
    mapping: |
      root = {}

pipeline:
  processors:
    - mapping: |
        root.db = "homelab"
        root.q = "SELECT * FROM warp WHERE topic LIKE 'warp/meters/%' AND time < '2026-04-29 19:46:39.376863' ORDER BY time"
        root.format = "json"
    - http:
        url: http://influxdb3.influxdb.svc:8181/api/v3/query_sql
        verb: POST
        headers:
          Authorization: Bearer ${INFLUXDB_TOKEN}
          Content-Type: application/json
    - unarchive:
        format: json_array
    - mapping: |
        let evt = this
        let parts = $evt.topic.split("/")
        # warp/meters/<id>/values → meter_id from parts[2]
        root = {
          "time":       $evt.time,
          "sub_topic":  $parts.slice(1).join("."),
          "meter_id":   $parts.index(2).number(),
          "voltage_l1": $evt.voltage_L1,
          "voltage_l2": $evt.voltage_L2,
          "voltage_l3": $evt.voltage_L3,
          "current_l1": $evt.current_L1,
          "current_l2": $evt.current_L2,
          "current_l3": $evt.current_L3,
          "power_l1":   $evt.power_L1,
          "power_l2":   $evt.power_L2,
          "power_l3":   $evt.power_L3,
          "raw":        $evt,
        }

output:
  sql_raw:
    driver: pgx
    dsn: postgres://${PGUSER}:${PGPASSWORD}@timescaledb-db-pooler.timescaledb.svc.cluster.local:5432/homelab?sslmode=disable
    init_statement: |
      SET timezone = 'UTC';
    query: |
      INSERT INTO migration.warp_meter (
        time, sub_topic, meter_id,
        voltage_l1, voltage_l2, voltage_l3,
        current_l1, current_l2, current_l3,
        power_l1, power_l2, power_l3,
        raw
      )
      SELECT
        (e->>'time')::timestamptz,
        e->>'sub_topic',
        (e->>'meter_id')::smallint,
        (e->>'voltage_l1')::double precision,
        (e->>'voltage_l2')::double precision,
        (e->>'voltage_l3')::double precision,
        (e->>'current_l1')::double precision,
        (e->>'current_l2')::double precision,
        (e->>'current_l3')::double precision,
        (e->>'power_l1')::double precision,
        (e->>'power_l2')::double precision,
        (e->>'power_l3')::double precision,
        e->'raw'
      FROM jsonb_array_elements($1::jsonb) AS e
      ON CONFLICT DO NOTHING
    args_mapping: |
      root = [content().string()]
    batching:
      count: 1000
      period: 10s
      processors:
        - archive:
            format: json_array
