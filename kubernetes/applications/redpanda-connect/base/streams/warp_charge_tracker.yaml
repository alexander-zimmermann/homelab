input:
  nats_jetstream:
    urls: ["nats://nats.nats.svc:4222"]
    auth:
      user: redpanda-connect
      password: ${NATS_PASSWORD}
    stream: WARP
    subject: warp.charge_tracker.>
    durable: redpanda-connect-warp-charge-tracker
    deliver: all
    ack_wait: 30s
    max_ack_pending: 256

pipeline:
  processors:
    - mapping: |
        let evt = this
        let parts = meta("nats_subject").split(".")
        root = {
          "time":            meta("nats_timestamp").or(now().ts_format("2006-01-02T15:04:05.999999Z")),
          "sub_topic":       $parts.slice(1).join("."),
          "user_id":         $evt.user_id.or(null),
          "charge_duration": $evt.charge_duration.or(null),
          "energy_charged":  $evt.energy_charged.or(null),
          "tracked_charges": $evt.tracked_charges.or(null),
          "raw":             $evt,
        }

output:
  broker:
    # Both outputs must succeed before the NATS message is acked.
    # If RustFS is down, NATS will retry → TS-Insert is also delayed.
    # That is the desired behavior: cold archive must keep up with TS.
    pattern: fan_out
    outputs:
      # Hot tier: typed columns into TimescaleDB
      - sql_raw:
          driver: pgx
          dsn: postgres://${PGUSER}:${PGPASSWORD}@timescaledb-db-pooler.timescaledb.svc.cluster.local:5432/homelab?sslmode=disable
          init_statement: |
            SET timezone = 'UTC';
          query: |
            INSERT INTO warp_charge_tracker (
              time, sub_topic,
              user_id, charge_duration, energy_charged, tracked_charges,
              raw
            )
            VALUES ($1, $2, $3, $4, $5, $6, $7)
          args_mapping: |
            root = [
              this.time,
              this.sub_topic,
              this.user_id,
              this.charge_duration,
              this.energy_charged,
              this.tracked_charges,
              this.raw.string(),
            ]
      # Cold archive: original NATS payload as Parquet on RustFS
      - aws_s3:
          bucket: nats-archive
          region: us-east-1
          endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
          force_path_style_urls: true
          credentials:
            id: ${RUSTFS_ACCESS_KEY}
            secret: ${RUSTFS_SECRET_KEY}
          path: warp_charge_tracker/${!timestamp("2006/01/02/15")}/${!uuid_v4()}.parquet
          batching:
            count: 10000
            period: 1h
            processors:
              - mapping: |
                  root = {
                    "time":    this.time,
                    "subject": meta("nats_subject"),
                    "payload": this.raw.format_json(),
                  }
              - parquet_encode:
                  schema:
                    - { name: time,    type: UTF8 }
                    - { name: subject, type: UTF8 }
                    - { name: payload, type: UTF8 }
