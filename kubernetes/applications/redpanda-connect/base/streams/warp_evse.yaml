input:
  nats_jetstream:
    urls: ["nats://nats.nats.svc:4222"]
    auth:
      user: redpanda-connect
      password: ${NATS_PASSWORD}
    stream: WARP
    subject: warp.evse.>
    durable: redpanda-connect-warp-evse
    deliver: all
    ack_wait: 30s
    max_ack_pending: 2000

pipeline:
  processors:
    - mapping: |
        let evt = this
        let parts = meta("nats_subject").split(".")
        root = {
          "time":                     meta("nats_timestamp").or(now().ts_format("2006-01-02T15:04:05.999999Z")),
          "sub_topic":                $parts.slice(1).join("."),
          "charger_state":            $evt.charger_state.or(null),
          "error_state":              $evt.error_state.or(null),
          "contactor_error":          $evt.contactor_error.or(null),
          "dc_fault_current_state":   $evt.dc_fault_current_state.or(null),
          "allowed_charging_current": $evt.allowed_charging_current.or(null),
          "iec61851_state":           $evt.iec61851_state.or(null),
          "lock_state":               $evt.lock_state.or(null),
          "contactor_state":          $evt.contactor_state.or(null),
          "raw":                      $evt,
        }

output:
  broker:
    pattern: fan_out
    outputs:
      - sql_raw:
          driver: pgx
          max_in_flight: 16
          dsn: postgres://${PGUSER}:${PGPASSWORD}@timescaledb-db-pooler.timescaledb.svc.cluster.local:5432/homelab?sslmode=disable
          init_statement: |
            SET timezone = 'UTC';
          query: |
            INSERT INTO warp_evse (
              time, sub_topic,
              charger_state, error_state, contactor_error, dc_fault_current_state,
              allowed_charging_current,
              iec61851_state, lock_state, contactor_state
            )
            VALUES (
              $1, $2,
              $3, $4, $5, $6,
              $7,
              ($8::numeric)::smallint, ($9::numeric)::smallint, ($10::numeric)::smallint
            )
          args_mapping: |
            root = [
              this.time,
              this.sub_topic,
              this.charger_state,
              this.error_state,
              this.contactor_error,
              this.dc_fault_current_state,
              this.allowed_charging_current,
              this.iec61851_state,
              this.lock_state,
              this.contactor_state,
            ]
      - aws_s3:
          bucket: nats-archive
          region: us-east-1
          endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
          force_path_style_urls: true
          credentials:
            id: ${RUSTFS_ACCESS_KEY}
            secret: ${RUSTFS_SECRET_KEY}
          path: warp_evse/${!now().ts_format("2006/01/02/15")}/${!uuid_v4()}.parquet
          batching:
            count: 2000
            period: 15m
            processors:
              - mapping: |
                  root = {
                    "time":    this.time,
                    "subject": meta("nats_subject"),
                    "payload": this.raw.format_json(),
                  }
              - parquet_encode:
                  schema:
                    - { name: time,    type: UTF8 }
                    - { name: subject, type: UTF8 }
                    - { name: payload, type: UTF8 }
