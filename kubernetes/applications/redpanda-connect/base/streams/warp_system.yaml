input:
  broker:
    inputs:
      - nats_jetstream:
          urls: ["nats://nats.nats.svc:4222"]
          auth:
            user: redpanda-connect
            password: ${NATS_PASSWORD}
          stream: WARP
          subject: warp.rtc.>
          durable: redpanda-connect-warp-system-rtc
          deliver: all
          ack_wait: 30s
          max_ack_pending: 2000
      - nats_jetstream:
          urls: ["nats://nats.nats.svc:4222"]
          auth:
            user: redpanda-connect
            password: ${NATS_PASSWORD}
          stream: WARP
          subject: warp.esp32.>
          durable: redpanda-connect-warp-system-esp32
          deliver: all
          ack_wait: 30s
          max_ack_pending: 2000
      - nats_jetstream:
          urls: ["nats://nats.nats.svc:4222"]
          auth:
            user: redpanda-connect
            password: ${NATS_PASSWORD}
          stream: WARP
          subject: warp.ntp.>
          durable: redpanda-connect-warp-system-ntp
          deliver: all
          ack_wait: 30s
          max_ack_pending: 2000

pipeline:
  processors:
    - mapping: |
        let evt = this
        let parts = meta("nats_subject").split(".")
        root = {
          "time":      meta("nats_timestamp").or(now().ts_format("2006-01-02T15:04:05.999999Z")),
          "sub_topic": $parts.slice(1).join("."),
          "raw":       $evt,
        }

output:
  broker:
    pattern: fan_out
    outputs:
      - sql_raw:
          driver: pgx
          max_in_flight: 16
          dsn: postgres://${PGUSER}:${PGPASSWORD}@timescaledb-db-pooler.timescaledb.svc.cluster.local:5432/homelab?sslmode=disable
          init_statement: |
            SET timezone = 'UTC';
          query: |
            INSERT INTO warp_system (time, sub_topic)
            VALUES ($1, $2)
          args_mapping: |
            root = [
              this.time,
              this.sub_topic,
            ]
      - aws_s3:
          bucket: nats-archive
          region: us-east-1
          endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
          force_path_style_urls: true
          credentials:
            id: ${RUSTFS_ACCESS_KEY}
            secret: ${RUSTFS_SECRET_KEY}
          path: warp_system/${!now().ts_format("2006/01/02/15")}/${!uuid_v4()}.parquet
          batching:
            count: 2000
            period: 15m
            processors:
              - mapping: |
                  root = {
                    "time":    this.time,
                    "subject": meta("nats_subject"),
                    "payload": this.raw.format_json(),
                  }
              - parquet_encode:
                  schema:
                    - { name: time,    type: UTF8 }
                    - { name: subject, type: UTF8 }
                    - { name: payload, type: UTF8 }
