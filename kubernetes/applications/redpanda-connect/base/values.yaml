# Pipeline definitions in streams/*.yaml, mounted via configMapGenerator
streams:
  enabled: true
  streamsConfigMap: redpanda-connect-streams

# JetStream durable consumer can only bind one subscription — Recreate avoids "already bound" loop
updateStrategy:
  type: Recreate

env:
  # NATS user (cloned from nats namespace by Kyverno)
  - name: NATS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: redpanda-connect-credentials
        key: NATS_PASSWORD
  # CNPG-managed connect-role credentials (cloned from timescaledb namespace by Kyverno)
  - name: PGUSER
    valueFrom:
      secretKeyRef:
        name: timescaledb-db-connect-secret
        key: username
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: timescaledb-db-connect-secret
        key: password
  # RustFS admin credentials for the cold-archive parquet output (cloned from rustfs namespace by Kyverno)
  - name: RUSTFS_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: rustfs-admin-credentials
        key: RUSTFS_ACCESS_KEY
  - name: RUSTFS_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: rustfs-admin-credentials
        key: RUSTFS_SECRET_KEY

serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: prometheus
