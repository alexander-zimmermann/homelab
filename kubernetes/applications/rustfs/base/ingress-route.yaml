apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: rustfs-console
  namespace: rustfs
  annotations:
    # ExternalDNS configuration for Cloudflare
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    kubernetes.io/ingress.class: traefik
    # Homepage Service Discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Data & AI"
    gethomepage.dev/name: "RustFS"
    gethomepage.dev/icon: "rustfs.png"
    gethomepage.dev/weight: "1"
    gethomepage.dev/href: "https://PLACEHOLDER"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=rustfs"

spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`PLACEHOLDER`)
      priority: 10
      middlewares:
        - name: chain-mfa-auth
          namespace: ingress-controller
      services:
        - kind: Service
          name: rustfs-svc
          port: 9001
  tls:
    secretName: rustfs-console-tls
