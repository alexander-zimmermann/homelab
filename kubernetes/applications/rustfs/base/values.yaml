# Standalone mode (single replica) for homelab usage
replicaCount: 1
mode:
  standalone:
    enabled: true
  distributed:
    enabled: false

# Credentials are provided via SealedSecret; the chart reads them from the
# referenced Secret
secret:
  existingSecret: rustfs-admin-credentials

config:
  rustfs:
    # Service DNS used for internal access.
    server_domains: rustfs-svc.rustfs.svc.cluster.local
    # Set log level to error to suppress verbose tracing warnings
    log_level: "error"

# Skip recursive chown on PVC when root perms already match (avoids ~3 min
# fsGroup walk over 100k+ files on NFS-backed PVC at every pod start)
podSecurityContext:
  fsGroupChangePolicy: OnRootMismatch

# Ingress is managed outside of the chart (Traefik IngressRoute manifests)
ingress:
  enabled: false

# Storage configuration for data and logs
storageclass:
  name: nfs-csi
  dataStorageSize: PLACEHOLDER
  logStorageSize: PLACEHOLDER

# Per-op drive timeouts and health-state thresholds added in chart 0.0.95.
# Chart defaults are 5s per metadata op (rustfs#2564) which trips FaultyDisk
# on NFS-CSI under scanner load (rustfs#2601). Loosen them to give NFS-backed
# metadata operations enough headroom.
extraEnv:
  - name: RUSTFS_DRIVE_METADATA_TIMEOUT_SECS
    value: "30"
  - name: RUSTFS_DRIVE_DISK_INFO_TIMEOUT_SECS
    value: "30"
  - name: RUSTFS_DRIVE_LIST_DIR_TIMEOUT_SECS
    value: "60"
  - name: RUSTFS_DRIVE_WALKDIR_TIMEOUT_SECS
    value: "120"
  - name: RUSTFS_DRIVE_WALKDIR_STALL_TIMEOUT_SECS
    value: "30"
  - name: RUSTFS_DRIVE_SUSPECT_FAILURE_THRESHOLD
    value: "10"
