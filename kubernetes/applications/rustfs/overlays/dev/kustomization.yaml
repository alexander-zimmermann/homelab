apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and Homepage href
  - sourceValue: rustfs-console.zimmermann.phd
    targets:
      - select:
          kind: Certificate
          name: rustfs-console-tls
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: rustfs-console
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: rustfs-console
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1

  # Inject storage size configuration
  - sourceValue: 5Gi
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: rustfs-data
        fieldPaths:
          - spec.resources.requests.storage
  - sourceValue: 1Gi
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: rustfs-logs
        fieldPaths:
          - spec.resources.requests.storage

patches:
  # RustFS server manages distributed storage and API access
  - target:
      kind: Deployment
      name: rustfs
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/resources
        value: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi
