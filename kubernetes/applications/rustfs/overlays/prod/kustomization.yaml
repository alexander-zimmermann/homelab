apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and Homepage href
  - sourceValue: rustfs-console.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: rustfs-console-tls
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: rustfs-console
        fieldPaths:
          - spec.routes.0.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: rustfs-console
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1

  # Inject storage size configuration
  - sourceValue: 500Gi
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: rustfs-data
        fieldPaths:
          - spec.resources.requests.storage
  - sourceValue: 5Gi
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: rustfs-logs
        fieldPaths:
          - spec.resources.requests.storage

patches:
  # RustFS server manages distributed storage and API access.
  # TEMP: memory limit bumped 512Mi → 2Gi during the InfluxDB 3 backfill /
  # recovery phase (2026-04-23). 512Mi got the pod OOMKilled under the
  # Telegraf-retry-buffer write spike; revisit once backfill is complete.
  - target:
      kind: Deployment
      name: rustfs
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/resources
        value: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 2Gi

  # RustFS API service with static IP and BGP advertisement
  - target:
      kind: Service
      name: rustfs-svc
    patch: |-
      - op: test
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /metadata/annotations/io.cilium~1lb-ipam-ips
        value: "192.168.10.32"
