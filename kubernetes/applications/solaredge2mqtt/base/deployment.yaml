apiVersion: apps/v1
kind: Deployment

metadata:
  name: solaredge2mqtt

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: solaredge2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solaredge2mqtt
    spec:
      automountServiceAccountToken: false
      volumes:
        # Non-sensitive configuration from ConfigMap.
        - name: config-volume
          configMap:
            name: solaredge2mqtt-1-config
        # MQTT credentials (secrets.yml with password).
        - name: secrets-volume
          secret:
            secretName: solaredge2mqtt-credentials
        # Writable cache directory required by the application.
        - name: cache-volume
          emptyDir: {}
      containers:
        - name: solaredge2mqtt
          image: ghcr.io/deroetzi/solaredge2mqtt:main
          env:
            - name: TZ
              value: "Europe/Berlin"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: secrets-volume
              mountPath: /app/config/secrets.yml
              subPath: secrets.yml
              readOnly: true
            - name: cache-volume
              mountPath: /app/cache
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

