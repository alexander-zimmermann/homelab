# EMS-ESP heating-system data via MQTT. All boiler/thermostat/mixer topics collapse into the
# single `ems-esp` measurement; the `topic_parsing` block uses the first topic segment as the
# measurement name.
[[inputs.mqtt_consumer]]
  servers = ["tcp://nats.nats.svc.cluster.local:1883"]
  username = "telegraf"
  password = "${NATS_MQTT_PASSWORD}"
  data_format = "json"

  topics = [
    "ems-esp/boiler_data",
    "ems-esp/boiler_data_dhw",
    "ems-esp/thermostat_data",
    "ems-esp/thermostat_data_hc1",
    "ems-esp/thermostat_data_dhw",
    "ems-esp/mixer_data",
    "ems-esp/mixer_data_hc1",
  ]

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "ems-esp/+"
    measurement = "measurement/_"
