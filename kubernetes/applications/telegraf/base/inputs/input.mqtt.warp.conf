# Warp charger (ESP32) data via MQTT. Three subscribers with different parsers: live
# EVSE/charge-tracker state (JSON), last-charges history (XPath over JSON, needs the warp timestamp
# processor — see processor.mqtt.warp.conf), and the built-in power meter (XPath, indexed
# array access for L1/L2/L3 voltages/currents/powers).

[[inputs.mqtt_consumer]]
  servers = ["tcp://nats.nats.svc.cluster.local:1883"]
  username = "telegraf"
  password = "${NATS_MQTT_PASSWORD}"
  data_format = "json"

  topics = [
    "warp/evse/state",
    "warp/charge_tracker/state",
    "warp/charge_tracker/current_charge",
  ]

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "warp/+/+"
    measurement = "measurement/_/_"


[[inputs.mqtt_consumer]]
  servers = ["tcp://nats.nats.svc.cluster.local:1883"]
  username = "telegraf"
  password = "${NATS_MQTT_PASSWORD}"
  data_format = "xpath_json"

  topics = [
    "warp/charge_tracker/last_charges",
  ]
  xpath_native_types = true

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "warp/charge_tracker/last_charges"
    measurement = "measurement/_/_"

  [[inputs.mqtt_consumer.xpath]]
    metric_selection = "descendant::*"

    [inputs.mqtt_consumer.xpath.fields]
      charge_duration = "charge_duration"
      energy_charged = "energy_charged"

    [inputs.mqtt_consumer.xpath.tags]
      user_id = "user_id"
      timestamp_minutes = "timestamp_minutes"


[[inputs.mqtt_consumer]]
  servers = ["tcp://nats.nats.svc.cluster.local:1883"]
  username = "telegraf"
  password = "${NATS_MQTT_PASSWORD}"
  data_format = "xpath_json"

  topics = [
    "warp/meters/0/values",
  ]
  xpath_native_types = true

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "warp/meters/0/values"
    measurement = "measurement/_/_/_"

  [[inputs.mqtt_consumer.xpath]]

    # The meter publishes a positional array of 9 floats; XPath index is
    # 1-based. Order matches the charger firmware's internal register layout.
    [inputs.mqtt_consumer.xpath.fields]
      voltage_L1 = "//*[1]"
      voltage_L2 = "//*[2]"
      voltage_L3 = "//*[3]"
      current_L1 = "//*[4]"
      current_L2 = "//*[5]"
      current_L3 = "//*[6]"
      power_L1 = "//*[7]"
      power_L2 = "//*[8]"
      power_L3 = "//*[9]"
