# Consolidate KNX metrics into a single `knx` measurement. The knx_listener plugin emits one
# measurement per configured group address, which explodes InfluxDB 3's per-(table, hour)
# partitioning. The original name is preserved as the `knx_name` tag.

[[processors.starlark]]
  source = '''
def apply(metric):
    # knx_listener is the only input that emits a `groupaddress` tag —
    # use its presence as the selector. A new KNX top-level prefix (say
    # "Multimedia.*") gets picked up automatically; an outdated namepass
    # list would silently drop it.
    if "groupaddress" not in metric.tags:
        return metric

    # Preserve the human-readable configured name for Grafana legends.
    metric.tags["knx_name"] = metric.name

    # Split the group address (e.g. "16/1/0") into its ETS hierarchy:
    #   main   = function   (16 = Versorgungstechnik, 9 = Sensorik, ...)
    #   middle = floor      (0 = Zentral, 1 = KG, 2 = EG, 3 = OG, 4 = DG, 5 = Außen)
    #   sub    = specific signal
    parts = metric.tags["groupaddress"].split("/")
    if len(parts) == 3:
        metric.tags["knx_main"] = parts[0]
        metric.tags["knx_middle"] = parts[1]
        metric.tags["knx_sub"] = parts[2]

    # The `value` field arrives as a float for DPT 9.*/13.*/14.* sensors and
    # as a bool for DPT 1.001 alarms. Since all group addresses now share a
    # single `knx` measurement, the `value` column has to be one concrete
    # type — cast the bools to 0.0/1.0 so InfluxDB 3 accepts the writes.
    v = metric.fields.get("value")
    if type(v) == "bool":
        metric.fields["value"] = 1.0 if v else 0.0

    # Collapse into one measurement.
    metric.name = "knx"
    return metric
'''
