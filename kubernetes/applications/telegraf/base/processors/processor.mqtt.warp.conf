# The `warp/charge_tracker/last_charges` metric arrives with a `timestamp_minutes` tag
# (epoch minutes) instead of a usable event time. Rewrite metric.time from it so the last-charges
# entries land at the actual charge time rather than at ingest time.

[[processors.starlark]]
  namepass = ["warp"]

  source = '''
load("time.star", "time")

def apply(metric):
  if not metric.tags.get("topic") == "warp/charge_tracker/last_charges":
      return metric

  unix_ts = int(float(metric.tags["timestamp_minutes"]) * 60)
  metric.tags["timestamp"] = str(unix_ts)
  metric.time = time.from_timestamp(unix_ts).unix_nano
  metric.tags.pop("timestamp_minutes")
  return metric
'''
