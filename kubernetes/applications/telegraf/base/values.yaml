# Inject secrets as env vars from K8s Secrets
envFromSecret: "telegraf-credentials"

env:
  - name: NATS_MQTT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: telegraf-mqtt-credentials
        key: NATS_MQTT_PASSWORD

# Load input configs from config directory
args:
  - "--config=/etc/telegraf/telegraf.conf"
  - "--config-directory=/etc/telegraf.d/"

# Main telegraf.conf (chart converts YAML -> TOML)
config:
  processors: []
  outputs:
    - influxdb_v2:
        urls: ["http://influx.zimmermann.eu.com:8086"]
        token: "$INFLUXDB_TOKEN"
        organization: "zimmermann.eu.com"
        bucket: "telegraf/autogen"
    - prometheus_client:
        listen: ":9273"
  inputs: []

# Health endpoint for probes (port 8888)
metrics:
  health:
    enabled: true

# Mount input configs ConfigMap (generated by configMapGenerator)
volumes:
  - name: telegraf-inputs
    configMap:
      name: telegraf-inputs

mountPoints:
  - name: telegraf-inputs
    mountPath: /etc/telegraf.d
    readOnly: true

# Prometheus metrics port exposure
containerPorts:
  - name: metrics
    containerPort: 9273
    protocol: TCP

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# No RBAC/SA needed (no K8s API access)
rbac:
  create: false
serviceAccount:
  create: false

# No PDB needed (single replica, no HA)
pdb:
  create: false
