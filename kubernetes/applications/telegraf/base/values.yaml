env:
  - name: NATS_MQTT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: telegraf-mqtt-credentials
        key: NATS_MQTT_PASSWORD
  # Admin token for the in-cluster InfluxDB 3 Enterprise.
  # Secret is cloned from the influxdb namespace by Kyverno.
  - name: INFLUXDB_TOKEN
    valueFrom:
      secretKeyRef:
        name: influxdb-credentials
        key: admin-token

# Load input configs from config directory
args:
  - "--config=/etc/telegraf/telegraf.conf"
  - "--config-directory=/etc/telegraf.d/"

# Main telegraf.conf (chart converts YAML -> TOML)
config:
  # Temporarily enabled to capture InfluxDB 400 partial-write response body
  agent:
    debug: true
  processors: []
  outputs:
    - influxdb_v3:
        urls: ["http://influxdb3.influxdb.svc.cluster.local:8181"]
        token: "$INFLUXDB_TOKEN"
        database: "homelab"
    - prometheus_client:
        listen: ":9273"
    # Temporary mirror of every outgoing batch to disk so we can inspect
    # the exact line protocol that InfluxDB 3 rejects with HTTP 400.
    # Path is inside the pod; rotation keeps disk use bounded.
    - file:
        files: ["/tmp/telegraf-batch.lp"]
        data_format: "influx"
        rotation_max_size: "10MB"
        rotation_max_archives: 2
  inputs: []

# Health endpoint for probes (port 8888)
metrics:
  health:
    enabled: true

# Mount input configs ConfigMap (generated by configMapGenerator)
volumes:
  - name: telegraf-inputs
    configMap:
      name: telegraf-inputs

mountPoints:
  - name: telegraf-inputs
    mountPath: /etc/telegraf.d
    readOnly: true

# Prometheus metrics port exposure
containerPorts:
  - name: metrics
    containerPort: 9273
    protocol: TCP

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# No RBAC/SA needed (no K8s API access)
rbac:
  create: false
serviceAccount:
  create: false

# No PDB needed (single replica, no HA)
pdb:
  create: false
