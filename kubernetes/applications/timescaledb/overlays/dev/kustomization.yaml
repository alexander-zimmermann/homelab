apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Database storage — small, this overlay is a schema sandbox
  - sourceValue: 1Gi
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.storage.size

  # WAL storage
  - sourceValue: 1Gi
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.walStorage.size

  # max_wal_size — 80% of WAL PVC
  - sourceValue: "800MB"
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.postgresql.parameters.max_wal_size

  # Barman serverName — env-specific so prod and dev never share a WAL archive
  - sourceValue: timescaledb-db-dev
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.plugins.0.parameters.serverName

patches:
  - target:
      kind: Cluster
      name: timescaledb-db
    patch: |-
      - op: test
        path: /spec/instances
        value: 1
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
