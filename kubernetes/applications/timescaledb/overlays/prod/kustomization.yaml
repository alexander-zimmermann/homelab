apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Database storage
  - sourceValue: 10Gi
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.storage.size

  # WAL storage
  - sourceValue: 2Gi
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.walStorage.size

  # max_wal_size — 60% of WAL PVC. Sized down from 1600MB (80%) after
  # a one-time backfill pushed the WAL volume to 82%; PG holds WAL up
  # to roughly max_wal_size as a recycle buffer, so a one-time burst
  # permanently bumps the steady-state footprint. 60% leaves ~800MB
  # burst headroom on the 2Gi PVC without forcing checkpoints as
  # aggressively as 50% would.
  - sourceValue: "1200MB"
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.postgresql.parameters.max_wal_size

  # Barman serverName — env-specific so prod and dev never share a WAL archive
  - sourceValue: timescaledb-db-prod
    targets:
      - select:
          kind: Cluster
          name: timescaledb-db
        fieldPaths:
          - spec.plugins.0.parameters.serverName

patches:
  - target:
      kind: Cluster
      name: timescaledb-db
    patch: |-
      - op: test
        path: /spec/instances
        value: 1
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
