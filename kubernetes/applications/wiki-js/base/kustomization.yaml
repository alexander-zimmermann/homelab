apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wiki-js
resources:
  - ./namespace.yaml
  - ./database.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml

helmCharts:
  - name: wiki
    repo: https://charts.js.wiki
    releaseName: wiki-js
    version: 3.0.0
    valuesFile: values.yaml
    namespace: wiki-js

patches:
  # Add Cilium BGP labels to the Helm-generated Service (chart doesn't support custom service labels)
  - target:
      kind: Service
      name: wiki-js
    patch: |-
      - op: add
        path: /metadata/labels/bgp.cilium.io~1ip-pool
        value: default
      - op: add
        path: /metadata/labels/bgp.cilium.io~1advertise-service
        value: default

labels:
  - includeSelectors: false
    pairs:
      homelab.app: wiki-js

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"
