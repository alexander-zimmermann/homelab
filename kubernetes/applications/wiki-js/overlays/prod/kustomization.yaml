apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Inject domain name into Certificate, IngressRoute, and Homepage href
  - sourceValue: wiki.zimmermann.sh
    targets:
      - select:
          kind: Certificate
          name: wiki-js-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: wiki-js
        fieldPaths:
          - spec.routes.0.match
          - spec.routes.1.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: IngressRoute
          name: wiki-js
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1
      - select:
          kind: IngressRoute
          name: wiki-js
        fieldPaths:
          - metadata.annotations.[gatus.home-operations.com/endpoint]
        options:
          delimiter: "/"
          index: 2

  # Inject database storage size
  - sourceValue: 512Mi
    targets:
      - select:
          kind: Cluster
          name: wiki-js-db
        fieldPaths:
          - spec.storage.size

  # Inject database WAL storage size
  - sourceValue: 256Mi
    targets:
      - select:
          kind: Cluster
          name: wiki-js-db
        fieldPaths:
          - spec.walStorage.size

  # Inject safe max_wal_size based on WAL PVC (80% rule)
  - sourceValue: "200MB"
    targets:
      - select:
          kind: Cluster
          name: wiki-js-db
        fieldPaths:
          - spec.postgresql.parameters.max_wal_size

  # Inject WAL archive server name to be unique per environment
  - sourceValue: wiki-js-db-prod
    targets:
      - select:
          kind: Cluster
          name: wiki-js-db
        fieldPaths:
          - spec.plugins.0.parameters.serverName

patches:
  # Wiki.js Deployment resources
  - target:
      kind: Deployment
      name: wiki-js
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/name
        value: wiki
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

  # PostgreSQL Cluster resources
  - target:
      kind: Cluster
      name: wiki-js-db
    patch: |-
      - op: test
        path: /spec/instances
        value: 1
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

  # Wiki.js service with static IP and BGP advertisement
  - target:
      kind: Service
      name: wiki-js
    patch: |-
      - op: test
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /metadata/annotations/io.cilium~1lb-ipam-ips
        value: "192.168.10.34"
