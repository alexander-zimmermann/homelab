configs:
  cm:
    # Allows Argo CD to render Kustomize projects that use `helmCharts:`
    kustomize.buildOptions: --enable-helm
    # Homelab optimization: reduce refresh frequency to save RAM/CPU
    timeout.reconciliation: 15m
    timeout.reconciliation.jitter: 5m
    # Exclude noisy resources from tracking to reduce memory footprint
    resource.exclusions: |
      - apiGroups:
          - "*"
        kinds:
          - Event
          - Endpoints
        clusters:
          - "*"
    # Homepage service account – read-only API key for the homepage widget
    accounts.homepage: apiKey
    # ArgoCD server URL – PLACEHOLDER is replaced per environment via overlay replacements
    url: https://argocd.PLACEHOLDER
    # OIDC via Authentik – PLACEHOLDER is replaced per environment via overlay replacements
    oidc.config: |
      name: Authentik
      issuer: https://PLACEHOLDER/application/o/argocd/
      clientID: argocd
      clientSecret: $argocd-oidc-secret:oidc.authentik.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      groupsClaim: groups

  rbac:
    # Default role for authenticated users without a matching group
    policy.default: role:readonly
    policy.csv: |
      g, platform-admins, role:admin
    scopes: "[groups, email]"

  params:
    # TLS is terminated externally via Ingress / reverse proxy.
    server.insecure: "true"
    # Reduce memory usage by splitting application tree into multiple Redis keys
    controller.app.tree.shard.size: "100"
    # Limit concurrent helm/kustomize processes (forking) to save RAM
    reposerver.parallelism.limit: "1"

# ArgoCD controller manages state of Applications, and performs sync/health checks
controller:
  metrics:
    # Exposes application sync status and controller performance metrics to Prometheus
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: prometheus

# ApplicationSet controller generates Applications from generators (e.g. Git, List, Cluster, etc.)
applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Notifications controller send notifications (Slack/webhook/etc.) on sync/health events
notifications:
  # Secret is managed via SealedSecret
  secret:
    create: false

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  # Pushover for sync failures, health degradation, and recovery — no email.
  notifiers:
    service.webhook.pushover: |
      url: https://api.pushover.net/1/messages.json
      headers:
        - name: Content-Type
          value: application/json

  # Notification content per event type
  templates:
    template.app-sync-failed: |
      webhook:
        pushover:
          method: POST
          body: |
            {
              "token": "{{printf "%s" (index .secrets "pushover-token")}}",
              "user": "{{printf "%s" (index .secrets "pushover-user-key")}}",
              "title": "Sync Failed: {{.app.metadata.name}}",
              "message": "{{.app.status.operationState.message | js}}",
              "priority": 1,
              "sound": "siren"
            }
    template.app-health-degraded: |
      webhook:
        pushover:
          method: POST
          body: |
            {
              "token": "{{printf "%s" (index .secrets "pushover-token")}}",
              "user": "{{printf "%s" (index .secrets "pushover-user-key")}}",
              "title": "Degraded: {{.app.metadata.name}}",
              "message": "Health: {{.app.status.health.status}}",
              "priority": 1,
              "sound": "falling"
            }
    template.app-health-recovered: |
      webhook:
        pushover:
          method: POST
          body: |
            {
              "token": "{{printf "%s" (index .secrets "pushover-token")}}",
              "user": "{{printf "%s" (index .secrets "pushover-user-key")}}",
              "title": "Recovered: {{.app.metadata.name}}",
              "message": "Application is healthy again.",
              "priority": 0,
              "sound": "magic"
            }

  # Trigger conditions: when to fire each notification.
  # Triggers fire only on the false→true transition of `when`, so on-health-recovered
  # only sends when health flips back to Healthy (typically after a Degraded period).
  triggers:
    trigger.on-sync-failed: |
      - description: Application syncing has failed
        send:
          - app-sync-failed
        when: app.status.operationState.phase in ['Error', 'Failed']
    trigger.on-health-degraded: |
      - description: Application has degraded
        send:
          - app-health-degraded
        when: app.status.health.status == 'Degraded'
    trigger.on-health-recovered: |
      - description: Application returned to healthy
        send:
          - app-health-recovered
        when: app.status.health.status == 'Healthy'

  subscriptions:
    - recipients:
        - pushover
      triggers:
        - on-sync-failed
        - on-health-degraded
        - on-health-recovered

# Internal Redis for ArgoCD (caching/locking)
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Disable DEX server, as we are using Authentik as OIDC provider directly
dex:
  enabled: false
