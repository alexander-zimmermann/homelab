---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replacements:
  # Replace the ArgoCD server URL for dev
  - sourceValue: "argocd.zimmermann.phd"
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.url
        options:
          delimiter: "/"
          index: 2

  # Replace the Authentik domain in the OIDC issuer URL for dev
  - sourceValue: "auth.zimmermann.phd"
    targets:
      - select:
          kind: ConfigMap
          name: argocd-cm
        fieldPaths:
          - data.[oidc.config]
        options:
          delimiter: "/"
          index: 2

  - sourceValue: "zimmermann.phd"
    targets:
      - select:
          kind: ConfigMap
          name: argocd-notifications-cm
        fieldPaths:
          - data.[service.email.smtp]
        options:
          delimiter: "@"
          index: 1

  # Append environment ('dev') into ApplicationSet paths and names
  - sourceValue: "dev"
    targets:
      - select:
          kind: ApplicationSet
        fieldPaths:
          - spec.template.spec.source.path
        options:
          delimiter: "/"
          index: 100
      - select:
          kind: ApplicationSet
        fieldPaths:
          - spec.template.metadata.name
        options:
          delimiter: "-"
          index: 100

patches:
  # ArgoCD repo-server renders/manages repos/Helm/Kustomize
  - target:
      kind: Deployment
      name: argocd-repo-server
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/resources
        value: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GOMEMLIMIT
          value: "241172480"

  # ArgoCD API/UI server
  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/resources
        value: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 125m
            memory: 128Mi
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GOMEMLIMIT
          value: "120586240"

  # ArgoCD controller manages state of Applications, and performs sync/health checks
  - target:
      kind: StatefulSet
      name: argocd-application-controller
    patch: |-
      - op: test
        path: /spec/template/spec/containers/0/resources
        value: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 125m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GOMEMLIMIT
          value: "483183821"
