transformations:
  # Identify Talos data-plane nodes by hostname and set the conventional worker role label
  # Matches legacy manual nodes (talos-dp-*) and Omni-provisioned nodes (homelab-{env}-data-plane-{suffix})
  - name: worker-role
    nodeSelector:
      - matchExpressions:
          - key: Hostname
            operator: Regexp
            values:
              - ^(talos-dp|homelab-.*-data-plane)-.*$
    labels:
      node-role.kubernetes.io/worker: ""

  # CCM-applied label used by Longhorn for node selection (and disk gating)
  - name: longhorn-storage
    nodeSelector:
      - matchExpressions:
          - key: Hostname
            operator: Regexp
            values:
              - ^(talos-dp|homelab-.*-data-plane)-.*$
    labels:
      node.longhorn.io/create-default-disk: "true"
