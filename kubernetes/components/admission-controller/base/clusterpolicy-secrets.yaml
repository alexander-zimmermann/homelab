apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: sync-cluster-secrets
  annotations:
    policies.kyverno.io/title: Sync Cluster Secrets
    policies.kyverno.io/category: Secrets
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      Synchronizes essential secrets across namespaces to ensure
      dependent services availability.

spec:
  generateExisting: true
  rules:
    # Syncs DHI registry secret from sealed-secrets-controller into all other namespaces
    - name: sync-dhi-registry-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - sealed-secrets-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: dhi-registry-secret
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        clone:
          namespace: sealed-secrets-controller
          name: dhi-registry-secret

    # Syncs ArgoCD OIDC client secret from authentik into gitops-controller namespace
    - name: sync-argocd-oidc-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - gitops-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: argocd-oidc-secret
        namespace: gitops-controller
        synchronize: true
        clone:
          namespace: authentik
          name: argocd-oidc-secret

    # Syncs CrowdSec Traefik LAPI key from crowdsec into ingress-controller for Traefik bouncer plugin
    - name: sync-crowdsec-traefik-lapi-key
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - ingress-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: crowdsec-traefik-lapi-key
        namespace: ingress-controller
        synchronize: true
        clone:
          namespace: crowdsec
          name: crowdsec-traefik-lapi-key

    # Syncs CrowdSec Homepage LAPI key from crowdsec into homepage for CrowdSec widget
    - name: sync-crowdsec-homepage-lapi-key
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: crowdsec-homepage-lapi-key
        namespace: homepage
        synchronize: true
        clone:
          namespace: crowdsec
          name: crowdsec-homepage-lapi-key

    # Syncs Authentik Homepage API token from authentik into homepage for Authentik widget
    - name: sync-authentik-homepage-token
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: authentik-homepage-token
        namespace: homepage
        synchronize: true
        clone:
          namespace: authentik
          name: authentik-homepage-token

    # Syncs InfluxDB admin token from influxdb into grafana for datasource authentication
    - name: sync-influxdb-credentials-grafana
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - grafana
      generate:
        apiVersion: v1
        kind: Secret
        name: influxdb-credentials
        namespace: grafana
        synchronize: true
        clone:
          namespace: influxdb
          name: influxdb-credentials

    # Syncs Grafana OIDC client secret from authentik into grafana namespace
    - name: sync-grafana-oidc-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - grafana
      generate:
        apiVersion: v1
        kind: Secret
        name: grafana-oidc-credentials
        namespace: grafana
        synchronize: true
        clone:
          namespace: authentik
          name: grafana-oidc-secret

    # Syncs Grafana admin credentials from grafana into homepage for Grafana widget
    - name: sync-grafana-admin-credentials
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: grafana-admin-credentials
        namespace: homepage
        synchronize: true
        clone:
          namespace: grafana
          name: grafana-admin-credentials

    # Syncs ArgoCD Homepage token from gitops-controller into homepage for ArgoCD widget
    - name: sync-argocd-homepage-token
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: argocd-homepage-token
        namespace: homepage
        synchronize: true
        clone:
          namespace: gitops-controller
          name: argocd-homepage-token

    # Syncs Redis password from redis namespace into ingress-controller for CrowdSec bouncer
    - name: sync-redis-password
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - ingress-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: redis-admin-credentials
        namespace: ingress-controller
        synchronize: true
        clone:
          namespace: redis
          name: redis-admin-credentials

    # Syncs Node-RED OIDC client secret from authentik into node-red namespace
    - name: sync-node-red-oidc-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - node-red
      generate:
        apiVersion: v1
        kind: Secret
        name: node-red-oidc-secret
        namespace: node-red
        synchronize: true
        clone:
          namespace: authentik
          name: node-red-oidc-secret

    # Syncs RustFS admin credentials from rustfs into authentik for WAL archiving/backup
    - name: sync-rustfs-admin-credentials-authentik
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - authentik
      generate:
        apiVersion: v1
        kind: Secret
        name: rustfs-admin-credentials
        namespace: authentik
        synchronize: true
        clone:
          namespace: rustfs
          name: rustfs-admin-credentials

    # Syncs SolarEdge2MQTT credentials from nats into solaredge2mqtt for MQTT authentication
    - name: sync-solaredge2mqtt-credentials
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - solaredge2mqtt
      generate:
        apiVersion: v1
        kind: Secret
        name: solaredge2mqtt-credentials
        namespace: solaredge2mqtt
        synchronize: true
        clone:
          namespace: nats
          name: solaredge2mqtt-credentials

    # Syncs Telegraf MQTT credentials from nats into telegraf for NATS MQTT gateway authentication
    - name: sync-telegraf-mqtt-credentials
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - telegraf
      generate:
        apiVersion: v1
        kind: Secret
        name: telegraf-mqtt-credentials
        namespace: telegraf
        synchronize: true
        clone:
          namespace: nats
          name: telegraf-mqtt-credentials

    # Syncs RustFS admin credentials from rustfs into influxdb for S3 object storage access
    - name: sync-rustfs-admin-credentials-influxdb
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - influxdb
      generate:
        apiVersion: v1
        kind: Secret
        name: rustfs-admin-credentials
        namespace: influxdb
        synchronize: true
        clone:
          namespace: rustfs
          name: rustfs-admin-credentials

    # Syncs RustFS admin credentials from rustfs into wiki-js for WAL archiving/backup
    - name: sync-rustfs-admin-credentials-wiki-js
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - wiki-js
      generate:
        apiVersion: v1
        kind: Secret
        name: rustfs-admin-credentials
        namespace: wiki-js
        synchronize: true
        clone:
          namespace: rustfs
          name: rustfs-admin-credentials
