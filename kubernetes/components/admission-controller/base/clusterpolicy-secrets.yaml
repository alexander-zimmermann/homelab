apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: sync-cluster-secrets
  annotations:
    policies.kyverno.io/title: Sync Cluster Secrets
    policies.kyverno.io/category: Secrets
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      Synchronizes essential secrets across namespaces to ensure
      dependent services availability.

spec:
  generateExisting: true
  rules:
    # Syncs DHI registry secret from sealed-secrets-controller into all namespaces except sealed-secrets-controller
    - name: sync-dhi-registry-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - sealed-secrets-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: dhi-registry-secret
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        clone:
          namespace: sealed-secrets-controller
          name: dhi-registry-secret

    # Syncs ArgoCD OIDC client secret from authentik into gitops-controller namespace
    - name: sync-argocd-oidc-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - gitops-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: argocd-oidc-secret
        namespace: gitops-controller
        synchronize: true
        clone:
          namespace: authentik
          name: argocd-oidc-secret

    # Syncs the CrowdSec LAPI key from crowdsec into ingress-controller for the Traefik bouncer plugin
    - name: sync-crowdsec-lapi-key
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - ingress-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: crowdsec-lapi-key
        namespace: ingress-controller
        synchronize: true
        clone:
          namespace: crowdsec
          name: crowdsec-lapi-key

    # Syncs CrowdSec Homepage LAPI key from crowdsec into homepage for CrowdSec widget
    - name: sync-crowdsec-homepage-lapi-key
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: crowdsec-homepage-lapi-key
        namespace: homepage
        synchronize: true
        clone:
          namespace: crowdsec
          name: crowdsec-homepage-lapi-key

    # Syncs Authentik Homepage API token from authentik into homepage for Authentik widget
    - name: sync-authentik-homepage-token
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - homepage
      generate:
        apiVersion: v1
        kind: Secret
        name: authentik-homepage-token
        namespace: homepage
        synchronize: true
        clone:
          namespace: authentik
          name: authentik-homepage-token

    # Syncs Redis password from redis namespace into ingress-controller for CrowdSec bouncer
    - name: sync-redis-password
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - ingress-controller
      generate:
        apiVersion: v1
        kind: Secret
        name: redis-admin-credentials
        namespace: ingress-controller
        synchronize: true
        clone:
          namespace: redis
          name: redis-admin-credentials
