apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: csi-block-storage-controller
resources:
  - ./namespace.yaml
  - ./certificate.yaml
  - ./ingress-route.yaml
  - ./storage-classes.yaml
  - ./recurring-jobs.yaml
  - ./sealed-secret.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    releaseName: longhorn
    version: 1.11.1
    valuesFile: values.yaml
    namespace: csi-block-storage-controller
    includeCRDs: true
    apiVersions:
      - monitoring.coreos.com/v1

replacements:
  # Inject the desired replica timeout into the default Longhorn StorageClass
  - sourceValue: "1440" # 1 day
    targets:
      - select:
          kind: ConfigMap
          name: longhorn-storageclass
        fieldPaths:
          - 'data.storageclass\.yaml.parameters.staleReplicaTimeout'

labels:
  - includeSelectors: false
    pairs:
      homelab.component: csi-block-storage-controller

commonAnnotations:
  argocd.argoproj.io/sync-wave: "-2"
