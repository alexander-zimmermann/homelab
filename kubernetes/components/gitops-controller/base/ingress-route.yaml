apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: argocd-server
  namespace: gitops-controller
  annotations:
    # ExternalDNS configuration for Cloudflare
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    kubernetes.io/ingress.class: traefik
    # Homepage Service Discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "GitOps"
    gethomepage.dev/name: "ArgoCD"
    gethomepage.dev/icon: "argo-cd.png"
    gethomepage.dev/weight: "1"
    gethomepage.dev/href: "https://PLACEHOLDER"
    gethomepage.dev/widget.type: "argocd"
    gethomepage.dev/widget.url: "http://argocd-server.gitops-controller.svc.cluster.local"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
    # Gatus — automated status page discovery (probes via /_gatus path with CF Access Service Token)
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      name: ArgoCD
      group: GitOps
      url: https://PLACEHOLDER/_gatus
      interval: 60s
      client:
        headers:
          CF-Access-Client-Id: "${CF_ACCESS_CLIENT_ID}"
          CF-Access-Client-Secret: "${CF_ACCESS_CLIENT_SECRET}"
      conditions:
        - "[STATUS] < 500"
        - "[RESPONSE_TIME] < 1500"
      alerts:
        - type: pushover

spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`PLACEHOLDER`)
      priority: 10
      middlewares:
        - name: chain-standard
          namespace: ingress-controller
      services:
        - kind: Service
          name: argocd-server
          port: 80
    - kind: Rule
      match: Host(`PLACEHOLDER`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      middlewares:
        - name: chain-standard
          namespace: ingress-controller
      services:
        - kind: Service
          name: argocd-server
          port: 80
          scheme: h2c
    # Gatus bypass route — matches only requests that went through Cloudflare Access (JWT header set by CF)
    - kind: Rule
      match: Host(`PLACEHOLDER`) && PathPrefix(`/_gatus`) && HeadersRegexp(`Cf-Access-Jwt-Assertion`, `.+`)
      priority: 20
      services:
        - kind: Service
          name: argocd-server
          port: 80
  tls:
    secretName: argocd-tls-cert
