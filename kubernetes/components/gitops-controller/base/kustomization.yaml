apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops-controller
resources:
  - ./certificate.yaml
  - ./ingress-route.yaml
  - ./sealed-secret.yaml
  - ./rbac.yaml
  - ./provision-sa-job.yaml

configMapGenerator:
  - name: argocd-sa-provisioner-script
    options:
      disableNameSuffixHash: true
    files:
      - scripts/provision-argocd-sa.sh
  - name: argocd-sa-provisioner-config
    options:
      disableNameSuffixHash: true
    files:
      - service-accounts.yaml=scripts/service-accounts.yaml

labels:
  - includeSelectors: false
    pairs:
      homelab.component: gitops-controller

commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
  argocd.argoproj.io/compare-options: ServerSideDiff=true
  argocd.argoproj.io/sync-options: ServerSideApply=true
