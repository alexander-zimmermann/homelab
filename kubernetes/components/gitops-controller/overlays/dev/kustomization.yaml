apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../../../bootstrap/gitops-controller/overlays/dev/

replacements:
  # Inject domain name into the Certificate and IngressRoute
  - sourceValue: argocd.zimmermann.phd
    targets:
      - select:
          kind: IngressRoute
          name: argocd-server
        fieldPaths:
          - spec.routes.0.match
          - spec.routes.1.match
          - spec.routes.2.match
        options:
          delimiter: "`"
          index: 1
      - select:
          kind: Certificate
          name: argocd-tls-cert
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: IngressRoute
          name: argocd-server
        fieldPaths:
          - metadata.annotations.[gethomepage.dev/href]
        options:
          delimiter: "//"
          index: 1
      - select:
          kind: IngressRoute
          name: argocd-server
        fieldPaths:
          - metadata.annotations.[gatus.home-operations.com/endpoint]
        options:
          delimiter: "/"
          index: 2
