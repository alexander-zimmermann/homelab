# Standard Middleware Chain: Applies global security headers, rate limiting, and request cleaning
apiVersion: traefik.io/v1alpha1
kind: Middleware

metadata:
  name: chain-standard
spec:
  chain:
    middlewares:
      - name: cloudflare
      - name: crowdsec
      - name: rate-limit
      - name: security-headers
      - name: compress
      - name: remove-headers

---
# Basic Authentication Chain: Standard security + Basic Auth
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: chain-basic-auth
spec:
  chain:
    middlewares:
      - name: chain-standard
      - name: basic-auth

---
# Authentik/SSO Chain: Standard security + Authentik ForwardAuth
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: chain-mfa-auth
spec:
  chain:
    middlewares:
      - name: chain-standard
      - name: authentik
