apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress-controller
resources:
  - ./namespace.yaml
  - ./certificate.yaml
  - ./middlewares.yaml
  - ./chain-middlewares.yaml
  - ./sealed-secret.yaml
  - ./ingress-ips.yaml

helmCharts:
  - name: traefik
    repo: oci://ghcr.io/traefik/helm
    releaseName: traefik
    version: 39.0.6
    valuesFile: values.yaml
    namespace: ingress-controller
    includeCRDs: true
    apiVersions:
      - monitoring.coreos.com/v1
      - policy/v1/PodDisruptionBudget

replacements:
  # Inject Cloudflare IPv4 into CrowdSec and Cloudflare middlewares
  - source:
      kind: ConfigMap
      name: ingress-ips
      fieldPath: data.CLOUDFLARE_IPv4
    targets:
      - select:
          kind: Middleware
          name: crowdsec
        fieldPaths:
          - spec.plugin.bouncer.forwardedheaderstrustedips
      - select:
          kind: Middleware
          name: cloudflare
        fieldPaths:
          - spec.plugin.cloudflare.trustedCIDRs

  # Inject Cloudflare IPv6 into CrowdSec and Cloudflare middlewares
  - source:
      kind: ConfigMap
      name: ingress-ips
      fieldPath: data.CLOUDFLARE_IPv6
    targets:
      - select:
          kind: Middleware
          name: crowdsec
        fieldPaths:
          - spec.plugin.bouncer.forwardedheaderstrustedips
        options:
          delimiter: ","
          index: -1
      - select:
          kind: Middleware
          name: cloudflare
        fieldPaths:
          - spec.plugin.cloudflare.trustedCIDRs
        options:
          delimiter: ","
          index: -1

  # Inject Local IPv4 into CrowdSec middleware
  - source:
      kind: ConfigMap
      name: ingress-ips
      fieldPath: data.LOCAL_IPv4
    targets:
      - select:
          kind: Middleware
          name: crowdsec
        fieldPaths:
          - spec.plugin.bouncer.clientTrustedIPs

labels:
  - includeSelectors: false
    pairs:
      homelab.component: ingress-controller

commonAnnotations:
  argocd.argoproj.io/sync-wave: "-8"
