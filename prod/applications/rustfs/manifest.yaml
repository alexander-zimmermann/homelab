apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: udm-pro.zimmermann.sh
    kubernetes.io/ingress.class: traefik
  labels:
    homelab.app: rustfs
  name: rustfs-console
  namespace: rustfs
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`console.rustfs.zimmermann.sh`)
    priority: 10
    services:
    - kind: Service
      name: rustfs-svc
      port: 9001
  tls:
