kind: Namespace
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: unifi-poller
  name: unifi-poller
---
apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/version: v2.21.0
    helm.sh/chart: unpoller-2.1.0
    homelab.app: unifi-poller
  name: unpoller
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/version: v2.21.0
    helm.sh/chart: unpoller-2.1.0
    homelab.app: unifi-poller
  name: unpoller
stringData:
  up.conf: |
    [poller]
      debug = false
      quiet = false
      plugins = []
    [prometheus]
      disable = false
      http_listen = "0.0.0.0:9130"
      report_errors = false
    [influxdb]
      disable = true
    [loki]
      disable = false
      url = "http://loki-gateway.loki.svc:80"
      verify_ssl = false
    [datadog]
      disable = true
    [webserver]
      enable = false
    [unifi]
      dynamic = false
    [[unifi.controller]]
      url = "https://udm-pro.zimmermann.eu.com"
      user = "unifi-poller"
      pass = "file:///etc/unifi-poller/secrets/unifi-password"
      sites = ["all"]
      save_ids = false
      save_events = false
      save_alarms = false
      save_anomalies = false
      save_dpi = false
      save_rogue = false
      verify_ssl = false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/version: v2.21.0
    helm.sh/chart: unpoller-2.1.0
    homelab.app: unifi-poller
  name: unpoller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: unpoller
      app.kubernetes.io/name: unpoller
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "10"
        prometheus.io/port: "9130"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/instance: unpoller
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: unpoller
        app.kubernetes.io/version: v2.21.0
        helm.sh/chart: unpoller-2.1.0
    spec:
      containers:
      - image: ghcr.io/unpoller/unpoller:v2.21.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /
            port: tcp
        name: unpoller
        ports:
        - containerPort: 9130
          name: tcp
          protocol: TCP
        - containerPort: 9130
          name: udp
          protocol: UDP
        readinessProbe:
          httpGet:
            path: /
            port: tcp
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext: {}
        volumeMounts:
        - mountPath: /etc/unpoller/up.conf
          name: config-volume
          subPath: up.conf
      securityContext: {}
      serviceAccountName: unpoller
      volumes:
      - name: config-volume
        secret:
          secretName: unpoller
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    homelab.app: unifi-poller
  name: unpoller-unifi-credentials
  namespace: unifi-poller
spec:
  encryptedData:
    unifi-password: 
  template:
    metadata:
      name: unpoller-unifi-credentials
      namespace: unifi-poller
    type: Opaque
---
