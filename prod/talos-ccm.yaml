apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    app.kubernetes.io/instance: talos-cloud-controller-manager
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: talos-cloud-controller-manager
    app.kubernetes.io/version: v1.12.0
    helm.sh/chart: talos-cloud-controller-manager-0.5.4
    homelab.component: talos-ccm
  name: talos-cloud-controller-manager
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: talos-cloud-controller-manager
      app.kubernetes.io/name: talos-cloud-controller-manager
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
        checksum/config: 2db5df6ee9c9a4919b81d63b1e46a6200145e4508e876bccdf1ee698584df07a
      labels:
        app.kubernetes.io/instance: talos-cloud-controller-manager
        app.kubernetes.io/name: talos-cloud-controller-manager
    spec:
      containers:
      - args:
        - --v=2
        - --cloud-provider=talos
        - --cloud-config=/etc/talos/ccm-config.yaml
        - --controllers=cloud-node,node-csr-approval
        - --leader-elect-resource-name=cloud-controller-manager-talos
        - --use-service-account-credentials
        - --secure-port=50258
        - --authorization-always-allow-paths=/healthz,/livez,/readyz,/metrics
        command:
        - /talos-cloud-controller-manager
        env:
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        image: ghcr.io/siderolabs/talos-cloud-controller-manager:v1.12.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
            scheme: HTTPS
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        name: talos-cloud-controller-manager
        ports:
        - containerPort: 50258
          name: metrics
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /etc/talos
          name: cloud-config
          readOnly: true
        - mountPath: /var/run/secrets/talos.dev
          name: talos-secrets
          readOnly: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      priorityClassName: system-cluster-critical
      securityContext:
        fsGroup: 10258
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 10258
        runAsNonRoot: true
        runAsUser: 10258
      serviceAccountName: talos-cloud-controller-manager
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: node.cloudprovider.kubernetes.io/uninitialized
        operator: Exists
      volumes:
      - configMap:
          defaultMode: 416
          name: talos-cloud-controller-manager
        name: cloud-config
      - name: talos-secrets
        secret:
          defaultMode: 416
          secretName: talos-cloud-controller-manager-talos-secrets
