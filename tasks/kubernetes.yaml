version: "3"

tasks:
  init:
    desc: "initialize cluster prerequisites"
    summary: |
      Initialize cluster prerequisites:
      - Creates the sealed-secrets-controller namespace
      - Injects the Sealed Secrets master key
      - Injects DHI registry credentials into sealed-secrets-controller and kube-system
      Underlying command: kubectl apply
    preconditions:
      - sh: command -v kubectl
        msg: "kubectl is not installed"
      - sh: test -f kubernetes/components/sealed-secrets-controller/base/master-key.yaml
        msg: "kubernetes/components/sealed-secrets-controller/base/master-key.yaml not found. Cluster bootstrap requires sealed secrets key."
      - sh: test -f kubernetes/components/sealed-secrets-controller/base/secret.yaml
        msg: "kubernetes/components/sealed-secrets-controller/base/secret.yaml not found. Cluster bootstrap requires DHI credentials."
    cmds:
      # wait for Kubernetes API readiness (trigger OIDC flow if needed)
      - kubectl cluster-info
      # ensure namespace exists before injecting secrets
      - kubectl create namespace sealed-secrets-controller --dry-run=client -o yaml | kubectl apply -f -
      # inject sealed secrets master key
      - kubectl apply -f kubernetes/components/sealed-secrets-controller/base/master-key.yaml
      # inject dhi registry credentials (needed for sealed-secrets-controller bootstrap)
      - kubectl apply -f kubernetes/components/sealed-secrets-controller/base/secret.yaml
      - kubectl annotate secret dhi-registry-secret -n sealed-secrets-controller sealed-secrets.bitnami.com/managed="true" --overwrite
      # inject dhi registry credentials into kube-system (needed for metrics-server, as Kyverno excludes this ns)
      - "sed 's/namespace: sealed-secrets-controller/namespace: kube-system/' kubernetes/components/sealed-secrets-controller/base/secret.yaml | kubectl apply -f -"

  delete:
    desc: "wipe all cluster resources"
    summary: |
      Delete all managed namespaces and wait for termination.
      Force-removes finalizers on stuck namespaces.
      Underlying command: kubectl delete ns
    vars:
      COMPONENTS_DIR: "kubernetes/components"
      MANAGED_NAMESPACES:
        sh: |
          grep -rh "namespace:" {{.COMPONENTS_DIR}}/*/base/kustomization.yaml kubernetes/applications/*/base/kustomization.yaml \
          | awk '{print $2}' \
          | sort -u \
          | grep -vE '^(default|kube-system|kube-public|kube-node-lease)$'
    preconditions:
      - sh: command -v kubectl
        msg: "kubectl is not installed"
    prompt: "Are you sure you want to wipe the cluster?"
    cmds:
      # async delete
      - for:
          var: MANAGED_NAMESPACES
          as: NS
        cmd: kubectl delete ns {{.NS}} --ignore-not-found=true --wait=false
      # force cleanup
      - for:
          var: MANAGED_NAMESPACES
          as: NS
        cmd: |
          kubectl wait --for=delete ns/{{.NS}} --timeout=10s >/dev/null 2>&1 || true
          if kubectl get ns {{.NS}} >/dev/null 2>&1; then
            echo "Force removing finalizers for {{.NS}}..."
            kubectl patch ns {{.NS}} -p '{"spec":{"finalizers":[]}}' --type=merge >/dev/null 2>&1
          fi
      # system component cleanup
      - kubectl delete secret hubble-tls-cert -n default --ignore-not-found=true

  status:
    desc: "verify cluster health"
    summary: |
      Verify cluster health and connectivity.
      Underlying command: kubectl get nodes/pods, cilium status
    preconditions:
      - sh: command -v kubectl
        msg: "kubectl is not installed"
      - sh: command -v cilium
        msg: "cilium-cli is not installed"
    cmds:
      - kubectl get nodes
      - kubectl get pods -A
      - cilium status -n cilium

  show:
    desc: "show admin credentials"
    summary: |
      Show important cluster secrets (ArgoCD admin).
      Underlying command: kubectl get secret
    vars:
      ARGOCD_PASSWORD:
        sh: kubectl get secret/argocd-initial-admin-secret -n gitops-controller -o jsonpath='{.data.password}' | base64 -d
    preconditions:
      - sh: command -v kubectl
        msg: "kubectl is not installed"
    cmds:
      - echo "ArgoCD admin password is {{.ARGOCD_PASSWORD}}"

  seal:
    desc: "seal a secret.yaml [path/to/secret.yaml]"
    summary: |
      Seals a secret.yaml and writes sealed-secret.yaml into the same directory.
      Arguments: [path/to/secret.yaml]
      Underlying command: kubeseal --cert master-key.yaml
    vars:
      INPUT: "{{index .CLI_ARGS_LIST 0}}"
      DIR:
        sh: dirname "{{.INPUT}}"
      CERT:
        sh: yq '.items[0].data["tls.crt"]' kubernetes/components/sealed-secrets-controller/base/master-key.yaml | base64 -d
    requires:
      vars:
        - INPUT
    preconditions:
      - sh: command -v kubeseal
        msg: "kubeseal is not installed"
      - sh: command -v yq
        msg: "yq is not installed"
      - sh: test -f kubernetes/components/sealed-secrets-controller/base/master-key.yaml
        msg: "master-key.yaml not found"
      - sh: test -f "{{.INPUT}}"
        msg: "'{{.INPUT}}' not found"
    cmds:
      - echo "{{.CERT}}" | kubeseal --cert /dev/stdin -f "{{.INPUT}}" -w "{{.DIR}}/sealed-secret.yaml"
      - sed -i -e '1{/^---$/d}' -e '/^---$/i\\' -e '/^metadata:/i\\' -e '/^spec:/i\\' "{{.DIR}}/sealed-secret.yaml"

  unseal:
    desc: "unseal a sealed-secret.yaml [path/to/sealed-secret.yaml]"
    summary: |
      Decrypts a sealed-secret.yaml back to plaintext secret.yaml in the same directory.
      Arguments: [path/to/sealed-secret.yaml]
      Underlying command: kubeseal --recovery-unseal --recovery-private-key master-key.yaml
    vars:
      INPUT: "{{index .CLI_ARGS_LIST 0}}"
      DIR:
        sh: dirname "{{.INPUT}}"
    requires:
      vars:
        - INPUT
    preconditions:
      - sh: command -v kubeseal
        msg: "kubeseal is not installed"
      - sh: test -f kubernetes/components/sealed-secrets-controller/base/master-key.yaml
        msg: "master-key.yaml not found"
      - sh: test -f "{{.INPUT}}"
        msg: "'{{.INPUT}}' not found"
    cmds:
      - kubeseal \
        --recovery-unseal \
        --recovery-private-key kubernetes/components/sealed-secrets-controller/base/master-key.yaml \
        < "{{.INPUT}}" \
        -o yaml > "{{.DIR}}/secret.yaml"
